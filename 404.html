<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Seite nicht gefunden | WaveVapes</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://wavevapes.de/">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="shortcut icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'"><noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;500;600&display=swap');
        :root { --neon-cyan: #67e8f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow-y: auto;
            padding: 24px 0;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .neon { color: var(--neon-cyan); }
        .neon-glow { text-shadow: 0 0 20px #67e8f966, 0 0 60px #67e8f933; }
        .grid-bg {
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(103,232,249,.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(103,232,249,.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }
        .card {
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(103,232,249,.15);
            border-radius: 20px;
            padding: 48px 40px;
            text-align: center;
            max-width: 480px;
            width: 90%;
            position: relative;
            z-index: 1;
        }
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(103,232,249,.12);
            border: 1px solid rgba(103,232,249,.3);
            color: var(--neon-cyan);
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            transition: background .2s, border-color .2s;
        }
        .btn:hover { background: rgba(103,232,249,.2); border-color: rgba(103,232,249,.6); }
        .btn-secondary {
            color: rgba(255,255,255,.6);
            border-color: rgba(255,255,255,.1);
            background: rgba(255,255,255,.04);
        }
        .btn-secondary:hover { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.2); color: #fff; }
        .pulse { animation: pulse 2.5s ease-in-out infinite; }
        @keyframes pulse {
            0%, 100% { opacity: .5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.04); }
        }
        .bad-url {
            font-family: monospace;
            font-size: 12px;
            color: rgba(103,232,249,.5);
            background: rgba(103,232,249,.06);
            border: 1px solid rgba(103,232,249,.12);
            border-radius: 6px;
            padding: 4px 10px;
            display: inline-block;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-bottom: 20px;
        }
        .progress-wrap {
            height: 3px;
            background: rgba(255,255,255,.06);
            border-radius: 99px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-bar {
            height: 100%;
            background: var(--neon-cyan);
            border-radius: 99px;
            width: 100%;
            transition: width 1s linear;
        }
        .redirect-hint {
            font-size: 11px;
            color: rgba(255,255,255,.25);
            margin-bottom: 24px;
        }
        .redirect-hint span { color: rgba(103,232,249,.6); }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="card">
        <div class="orbitron neon neon-glow pulse" style="font-size:88px;font-weight:700;line-height:1;margin-bottom:12px">404</div>
        <h1 class="orbitron" style="font-size:18px;font-weight:700;margin-bottom:10px">Seite nicht gefunden</h1>
        <p style="color:rgba(255,255,255,.5);font-size:14px;margin-bottom:16px;line-height:1.7">
            Diese Seite existiert nicht oder wurde verschoben.<br>
            Kein Problem — zurück zum Shop geht's hier entlang.
        </p>

        <div id="bad-url" class="bad-url" style="display:none"></div>

        <div class="progress-wrap">
            <div class="progress-bar" id="progress"></div>
        </div>
        <div class="redirect-hint">Weiterleitung in <span id="countdown">10</span>s &middot; <a href="/" style="color:rgba(103,232,249,.6);text-decoration:none">jetzt</a></div>

        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:24px">
            <a href="/" class="btn"><i class="fa-solid fa-house"></i> Zum Shop</a>
            <a href="/disposable-vapes-kaufen" class="btn btn-secondary"><i class="fa-solid fa-wind"></i> Vapes</a>
            <a href="/nic-salt-liquid-kaufen" class="btn btn-secondary"><i class="fa-solid fa-flask"></i> Liquids</a>
        </div>
        <div style="font-size:11px;color:rgba(255,255,255,.2)">© 2026 WaveVapes · <a href="/impressum" style="color:rgba(255,255,255,.2);text-decoration:none">Impressum</a></div>
    </div>
    <script>
        // Falsche URL anzeigen
        const path = window.location.pathname;
        if (path && path !== '/') {
            const el = document.getElementById('bad-url');
            el.textContent = path;
            el.style.display = 'inline-block';
        }

        // Auto-Redirect mit Countdown
        const SECONDS = 10;
        let remaining = SECONDS;
        const countdownEl = document.getElementById('countdown');
        const progressEl  = document.getElementById('progress');

        const tick = setInterval(() => {
            remaining--;
            countdownEl.textContent = remaining;
            progressEl.style.width = (remaining / SECONDS * 100) + '%';
            if (remaining <= 0) {
                clearInterval(tick);
                window.location.href = '/';
            }
        }, 1000);

        // Countdown stoppen wenn User selbst klickt
        document.querySelectorAll('a').forEach(a => a.addEventListener('click', () => clearInterval(tick)));
    </script>
</body>
</html>
