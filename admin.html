<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WaveVapes – Admin Dashboard</title>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a0a0a, #1e1233, #0a0a0a);
      color: white;
      min-height: 100vh;
    }

    .neon-text {
      text-shadow: 0 0 15px #67e8f9, 0 0 30px #67e8f9;
    }

    .admin-card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 1rem;
      padding: 1.5rem;
    }

    .status-waiting { background: #92400e; color: #fbbf24; }
    .status-paid    { background: #1e40af; color: #60a5fa; }
    .status-shipped { background: #065f46; color: #34d399; }
    .status-cancelled { background: #991b1b; color: #fca5a5; }

    .btn-admin {
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-primary   { background: #06b6d4; color: black; }
    .btn-primary:hover { background: #22d3ee; }

    .btn-danger    { background: #dc2626; color: white; }
    .btn-danger:hover { background: #ef4444; }

    .btn-success   { background: #10b981; color: white; }
    .btn-success:hover { background: #34d399; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #10b981;
      color: white;
      padding: 12px 24px;
      border-radius: 9999px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.4s, transform 0.4s;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-8px);
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="bg-zinc-950 border-b border-cyan-900/30 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <h1 class="text-3xl font-bold tracking-tight neon-text">WAVEVAPES ADMIN</h1>
      </div>
      <div class="flex items-center gap-6">
        <span id="admin-email" class="text-cyan-300"></span>
        <button onclick="logout()" class="bg-red-600 hover:bg-red-500 px-5 py-2 rounded-lg font-medium">
          Logout
        </button>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-10">

    <!-- Lade-Overlay + No-Admin -->
    <div id="auth-loading" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50">
      <div class="text-center">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-cyan-400 mx-auto mb-6"></div>
        <p class="text-xl">Prüfe Admin-Rechte...</p>
      </div>
    </div>

    <div id="no-admin" class="hidden text-center py-20">
      <h2 class="text-4xl font-bold text-red-400 mb-6">Zugriff verweigert</h2>
      <p class="text-xl mb-8">Du bist kein Admin.</p>
      <button onclick="window.location.href='index.html'" class="bg-cyan-500 hover:bg-cyan-400 text-black px-8 py-4 rounded-xl text-lg font-bold">
        Zurück zum Shop
      </button>
    </div>

    <!-- ADMIN DASHBOARD -->
    <div id="admin-content" class="hidden">

      <!-- TABS -->
      <div class="flex border-b border-zinc-700 mb-8">
        <button onclick="showTab('orders')" class="tab-btn px-6 py-3 font-medium border-b-4 border-transparent hover:border-cyan-400 transition-all tab-active">
          Bestellungen
        </button>
        <button onclick="showTab('products')" class="tab-btn px-6 py-3 font-medium border-b-4 border-transparent hover:border-cyan-400 transition-all">
          Produkte verwalten
        </button>
      </div>

      <!-- BESTELLUNGEN -->
      <div id="tab-orders" class="tab-content">
        <div class="admin-card mb-8">
          <h2 class="text-2xl font-bold mb-6">Alle Bestellungen (Live)</h2>
          <div class="overflow-x-auto">
            <table class="w-full text-left">
              <thead>
                <tr class="border-b border-zinc-700">
                  <th class="py-3 px-4">Nr</th>
                  <th class="py-3 px-4">Kunde</th>
                  <th class="py-3 px-4">Gesamt</th>
                  <th class="py-3 px-4">Status</th>
                  <th class="py-3 px-4">Datum</th>
                  <th class="py-3 px-4">Aktion</th>
                </tr>
              </thead>
              <tbody id="orders-table-body"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- PRODUKTE -->
      <div id="tab-products" class="tab-content hidden">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
          <!-- Neues Produkt -->
          <div class="admin-card">
            <h3 class="text-xl font-bold mb-6">Neues Produkt hinzufügen</h3>
            <form id="add-product-form" class="space-y-4">
              <input type="text" id="prod-name" placeholder="Produktname (z. B. Tornado Mango)" required class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 focus:outline-none focus:border-cyan-500"/>
              <input type="number" id="prod-price" placeholder="Preis in €" step="0.01" min="0.01" required class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 focus:outline-none focus:border-cyan-500"/>
              <input type="number" id="prod-stock" placeholder="Lagerbestand" min="0" required class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 focus:outline-none focus:border-cyan-500"/>
              <select id="prod-category" required class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 focus:outline-none focus:border-cyan-500">
                <option value="" disabled selected>Kategorie wählen</option>
                <option value="Tornado 30.000">Tornado 30.000</option>
                <option value="Normale Sorten">Normale Sorten</option>
                <option value="Neue Sorten">Neue Sorten</option>
              </select>
              <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-lg font-bold">
                Produkt erstellen
              </button>
            </form>
          </div>

          <!-- Produktliste -->
          <div class="admin-card">
            <h3 class="text-xl font-bold mb-6">Produkte verwalten</h3>
            <div id="products-list" class="space-y-4 max-h-[600px] overflow-y-auto pr-2"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- TOAST CONTAINER -->
  <div id="toast-container"></div>

  <script>
    // ────────────────────────────────────────────────
    //  FIREBASE KONFIGURATION (identisch mit deinem Shop)
    // ────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyDsIUl-iYmH42MPbusFLhGhj5oGLh01BzI",
      authDomain: "wavevapes-7a960.firebaseapp.com",
      projectId: "wavevapes-7a960",
      storageBucket: "wavevapes-7a960.firebasestorage.app",
      messagingSenderId: "1093624390275",
      appId: "1:1093624390275:web:b1b8ae17bcf1b59dffb1b6",
      measurementId: "G-B8T2B657LL"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ────────────────────────────────────────────────
    //  AUTH + ADMIN CHECK
    // ────────────────────────────────────────────────
    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }

      document.getElementById("admin-email").textContent = user.email;

      try {
        const userDoc = await db.collection("users").doc(user.uid).get();
        if (!userDoc.exists || userDoc.data().role !== "admin") {
          document.getElementById("auth-loading").classList.add("hidden");
          document.getElementById("no-admin").classList.remove("hidden");
          return;
        }

        // Admin → Dashboard laden
        document.getElementById("auth-loading").classList.add("hidden");
        document.getElementById("admin-content").classList.remove("hidden");

        loadOrders();
        loadProducts();
      } catch (err) {
        console.error("Admin-Check Fehler:", err);
        alert("Fehler beim Prüfen der Admin-Rechte.");
      }
    });

    function logout() {
      auth.signOut().then(() => window.location.href = "index.html");
    }

    // ────────────────────────────────────────────────
    //  TABS STEUERUNG
    // ────────────────────────────────────────────────
    function showTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById(`tab-${tabId}`).classList.remove('hidden');

      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('tab-active', 'border-cyan-400');
      });
      event.target.classList.add('tab-active', 'border-cyan-400');
    }

    // ────────────────────────────────────────────────
    //  BESTELLUNGEN LIVE (onSnapshot)
    // ────────────────────────────────────────────────
    function loadOrders() {
      const tbody = document.getElementById("orders-table-body");
      tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8">Lade Bestellungen...</td></tr>';

      db.collection("orders")
        .orderBy("date", "desc")
        .onSnapshot((snapshot) => {
          tbody.innerHTML = "";
          if (snapshot.empty) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-400">Keine Bestellungen vorhanden</td></tr>';
            return;
          }

          snapshot.forEach((doc) => {
            const data = doc.data();
            const date = data.date?.toDate?.() ? data.date.toDate().toLocaleString("de-DE") : "—";

            let statusClass = "";
            switch (data.status) {
              case "Warten auf Zahlung": statusClass = "status-waiting"; break;
              case "Bezahlt":            statusClass = "status-paid";    break;
              case "Versendet":          statusClass = "status-shipped"; break;
              case "Storniert":          statusClass = "status-cancelled"; break;
              default:                   statusClass = "bg-gray-700 text-gray-300";
            }

            const tr = document.createElement("tr");
            tr.className = "border-b border-zinc-800 hover:bg-zinc-800/50 transition";
            tr.innerHTML = `
              <td class="py-4 px-4 font-mono">${data.orderNumber || doc.id.slice(0,8)}</td>
              <td class="py-4 px-4">${data.userEmail || data.userId.slice(0,8) + '...'}</td>
              <td class="py-4 px-4 font-bold">${(data.total || 0).toFixed(2)} €</td>
              <td class="py-4 px-4">
                <span class="px-3 py-1 rounded-full text-sm ${statusClass}">
                  ${data.status || "Unbekannt"}
                </span>
              </td>
              <td class="py-4 px-4 text-gray-400">${date}</td>
              <td class="py-4 px-4">
                <select onchange="updateOrderStatus('${doc.id}', this.value)" class="bg-zinc-800 border border-zinc-700 rounded px-3 py-1 text-sm">
                  <option value="Warten auf Zahlung" ${data.status === "Warten auf Zahlung" ? "selected" : ""}>Warten auf Zahlung</option>
                  <option value="Bezahlt" ${data.status === "Bezahlt" ? "selected" : ""}>Bezahlt</option>
                  <option value="Versendet" ${data.status === "Versendet" ? "selected" : ""}>Versendet</option>
                  <option value="Storniert" ${data.status === "Storniert" ? "selected" : ""}>Storniert</option>
                </select>
              </td>
            `;
            tbody.appendChild(tr);
          });
        });
    }

    async function updateOrderStatus(orderId, newStatus) {
      try {
        await db.collection("orders").doc(orderId).update({
          status: newStatus,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        showToast(`Status auf "${newStatus}" geändert`);
      } catch (err) {
        console.error(err);
        alert("Fehler beim Ändern: " + err.message);
      }
    }

    // ────────────────────────────────────────────────
    //  PRODUKTE LADEN + VERWALTEN (exakt deine 3 Kategorien)
    // ────────────────────────────────────────────────
    function loadProducts() {
      const container = document.getElementById("products-list");
      container.innerHTML = '<p class="text-center py-8 text-gray-400">Lade Produkte...</p>';

      db.collection("products")
        .onSnapshot((snapshot) => {
          container.innerHTML = "";
          if (snapshot.empty) {
            container.innerHTML = '<p class="text-center py-8 text-gray-400">Noch keine Produkte vorhanden</p>';
            return;
          }

          const products = [];
          snapshot.forEach(doc => {
            const data = doc.data();
            products.push({ id: doc.id, ...data });
          });

          // Sortieren: erst aktive, dann alphabetisch
          products.sort((a, b) => {
            if (a.active !== b.active) return a.active ? -1 : 1;
            return a.name.localeCompare(b.name);
          });

          products.forEach(p => {
            const div = document.createElement("div");
            div.className = `flex justify-between items-center p-4 rounded-lg border ${p.active ? 'border-emerald-700 bg-emerald-950/30' : 'border-red-800 bg-red-950/30 opacity-75'}`;
            div.innerHTML = `
              <div class="flex-1">
                <div class="font-medium ${p.active ? '' : 'line-through text-gray-500'}">${p.name}</div>
                <div class="text-sm text-gray-400">
                  ${p.price.toFixed(2)} € • Lager: ${p.stock} • ${p.category}
                </div>
              </div>
              <div class="flex gap-3">
                <button onclick="editProduct('${p.id}', '${p.name}', ${p.price}, ${p.stock})" class="text-cyan-400 hover:text-cyan-300">
                  <i class="fa-solid fa-edit"></i>
                </button>
                <button onclick="toggleActive('${p.id}', ${!p.active})" class="${p.active ? 'text-emerald-400' : 'text-red-400'} hover:opacity-80">
                  <i class="fa-solid fa-power-off"></i>
                </button>
              </div>
            `;
            container.appendChild(div);
          });
        });
    }

    // Produkt hinzufügen
    document.getElementById("add-product-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const name     = document.getElementById("prod-name").value.trim();
      const priceStr = document.getElementById("prod-price").value.trim();
      const stockStr = document.getElementById("prod-stock").value.trim();
      const category = document.getElementById("prod-category").value;

      if (!name || !priceStr || !stockStr || !category) {
        alert("Bitte alle Felder ausfüllen");
        return;
      }

      const price = parseFloat(priceStr);
      const stock = parseInt(stockStr);

      if (isNaN(price) || price <= 0) return alert("Preis muss größer 0 sein");
      if (isNaN(stock) || stock < 0) return alert("Lagerbestand darf nicht negativ sein");

      try {
        await db.collection("products").add({
          name,
          price,
          stock,
          category,
          active: true
        });

        e.target.reset();
        showToast("Produkt erfolgreich hinzugefügt");
      } catch (err) {
        console.error(err);
        alert("Fehler beim Speichern: " + err.message);
      }
    });

    // Aktiv/Deaktivieren
    async function toggleActive(id, newActiveState) {
      if (!confirm(`Produkt wirklich ${newActiveState ? "aktivieren" : "deaktivieren"}?`)) return;

      try {
        await db.collection("products").doc(id).update({ active: newActiveState });
        showToast(`Produkt ${newActiveState ? "aktiviert" : "deaktiviert"}`);
      } catch (err) {
        alert("Fehler: " + err.message);
      }
    }

    // Bearbeiten (einfache Prompt-Version – kann später Modal werden)
    function editProduct(id, currentName, currentPrice, currentStock) {
      const newName  = prompt("Neuer Name:", currentName);
      const newPrice = prompt("Neuer Preis:", currentPrice);
      const newStock = prompt("Neuer Lagerbestand:", currentStock);

      if (newName === null || newPrice === null || newStock === null) return;

      const price = parseFloat(newPrice);
      const stock = parseInt(newStock);

      if (!newName.trim()) return alert("Name darf nicht leer sein");
      if (isNaN(price) || price <= 0) return alert("Ungültiger Preis");
      if (isNaN(stock) || stock < 0) return alert("Ungültiger Lagerbestand");

      db.collection("products").doc(id).update({
        name: newName.trim(),
        price,
        stock
      })
      .then(() => showToast("Produkt aktualisiert"))
      .catch(err => alert("Fehler: " + err.message));
    }

    // ────────────────────────────────────────────────
    //  TOAST HELPER
    // ────────────────────────────────────────────────
    function showToast(message) {
      const toast = document.createElement("div");
      toast.className = "toast show";
      toast.textContent = message;
      document.getElementById("toast-container").appendChild(toast);

      setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => toast.remove(), 400);
      }, 2600);
    }
  </script>
</body>
</html>
