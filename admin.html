<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WaveVapes – Admin Panel</title>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    :root { --neon-cyan: #67e8f9; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a0a0a, #1e1233, #0a0a0a);
      color: white;
      min-height: 100vh;
    }
    .neon-text { text-shadow: 0 0 15px var(--neon-cyan), 0 0 30px var(--neon-cyan); }
    .admin-card { background: #111827; border: 1px solid rgba(103,232,249,0.2); }
    .status-Zahlung { background:#facc15; color:black; }
    .status-Wird { background:#60a5fa; color:black; }
    .status-Versendet { background:#a78bfa; color:black; }
    .status-Zugestellt { background:#34d399; color:black; }
    .status-Storniert { background:#ef4444; color:white; }
  </style>
</head>
<body class="min-h-screen pb-20">

  <!-- AUTH MODAL (wird beim Laden gezeigt, wenn nicht eingeloggt) -->
  <div id="auth-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-10 max-w-md w-full mx-4 text-center">
      <h2 class="text-4xl font-bold neon-text mb-8">Admin Login</h2>
      <input id="admin-email" type="email" placeholder="Admin E-Mail" class="w-full bg-zinc-800 border border-cyan-500/30 focus:border-cyan-400 rounded-2xl px-6 py-4 mb-4 outline-none"/>
      <input id="admin-password" type="password" placeholder="Passwort" class="w-full bg-zinc-800 border border-cyan-500/30 focus:border-cyan-400 rounded-2xl px-6 py-4 mb-6 outline-none"/>
      <button onclick="adminLogin()" class="w-full bg-gradient-to-r from-cyan-500 to-purple-600 hover:from-cyan-400 hover:to-purple-500 text-black font-bold py-5 rounded-2xl text-xl transition">
        Einloggen
      </button>
      <p id="admin-error" class="text-red-400 mt-4 min-h-[1.5rem]"></p>
    </div>
  </div>

  <!-- NAVBAR -->
  <nav class="bg-black/80 backdrop-blur-xl border-b border-cyan-500/30 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <h1 class="text-3xl font-bold neon-text">WAVEVAPES ADMIN</h1>
        <span class="text-xs bg-red-600/80 px-3 py-1 rounded-full">nur für Admins</span>
      </div>
      <div class="flex items-center gap-6">
        <span id="current-admin" class="text-cyan-300"></span>
        <button onclick="adminLogout()" class="bg-red-600/80 hover:bg-red-700 px-5 py-2.5 rounded-xl font-medium transition">
          <i class="fa-solid fa-right-from-bracket mr-2"></i> Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-10">

    <!-- TABS -->
    <div class="flex border-b border-white/10 mb-10 overflow-x-auto">
      <button onclick="showTab('products')" class="tab-btn px-6 py-4 font-medium border-b-4 border-transparent hover:border-cyan-400 transition tab-active" data-tab="products">
        Produkte
      </button>
      <button onclick="showTab('orders')" class="tab-btn px-6 py-4 font-medium border-b-4 border-transparent hover:border-cyan-400 transition" data-tab="orders">
        Bestellungen
      </button>
      <button onclick="showTab('stats')" class="tab-btn px-6 py-4 font-medium border-b-4 border-transparent hover:border-cyan-400 transition" data-tab="stats">
        Statistiken
      </button>
    </div>

    <!-- PRODUKTE TAB -->
    <div id="tab-products" class="tab-content">
      <div class="flex justify-between items-center mb-8 flex-wrap gap-4">
        <h2 class="text-3xl font-bold">Produktverwaltung</h2>
        <button onclick="openProductModal()" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-3 rounded-xl font-medium flex items-center gap-2">
          <i class="fa-solid fa-plus"></i> Neues Produkt
        </button>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="admin-products-grid"></div>
    </div>

    <!-- BESTELLUNGEN TAB -->
    <div id="tab-orders" class="tab-content hidden">
      <h2 class="text-3xl font-bold mb-8">Bestellungen</h2>
      <div class="space-y-5" id="admin-orders-list"></div>
    </div>

    <!-- STATISTIKEN TAB -->
    <div id="tab-stats" class="tab-content hidden">
      <h2 class="text-3xl font-bold mb-8">Shop-Statistiken</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="admin-card rounded-2xl p-6">
          <h3 class="text-lg text-gray-400 mb-2">Gesamtumsatz</h3>
          <p class="text-4xl font-bold text-emerald-400" id="total-revenue">— €</p>
        </div>
        <div class="admin-card rounded-2xl p-6">
          <h3 class="text-lg text-gray-400 mb-2">Offene Bestellungen</h3>
          <p class="text-4xl font-bold text-amber-400" id="pending-orders">—</p>
        </div>
        <div class="admin-card rounded-2xl p-6">
          <h3 class="text-lg text-gray-400 mb-2">Aktive Loyalty-Punkte</h3>
          <p class="text-4xl font-bold text-cyan-400" id="total-loyalty">—</p>
        </div>
      </div>
    </div>

  </div>

  <!-- PRODUKT MODAL -->
  <div id="product-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
    <div class="bg-zinc-900 rounded-3xl p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-3xl font-bold" id="modal-title">Produkt bearbeiten</h3>
        <button onclick="closeProductModal()" class="text-4xl text-gray-400 hover:text-white">×</button>
      </div>

      <div class="space-y-5">
        <div>
          <label class="block text-sm text-gray-400 mb-1">Produktname</label>
          <input id="prod-name" type="text" class="w-full bg-zinc-800 border border-cyan-500/30 rounded-2xl px-5 py-3"/>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Kategorie</label>
          <select id="prod-category" class="w-full bg-zinc-800 border border-cyan-500/30 rounded-2xl px-5 py-3">
            <option>WaveVapes Tornado 30000</option>
            <option>Normale Sorten</option>
            <option>Neue Sorten</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-5">
          <div>
            <label class="block text-sm text-gray-400 mb-1">Preis (€)</label>
            <input id="prod-price" type="number" step="0.01" value="7.99" class="w-full bg-zinc-800 border border-cyan-500/30 rounded-2xl px-5 py-3"/>
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-1">Lagerbestand</label>
            <input id="prod-stock" type="number" value="50" class="w-full bg-zinc-800 border border-cyan-500/30 rounded-2xl px-5 py-3"/>
          </div>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Bild-URL</label>
          <input id="prod-image" type="url" placeholder="https://..." class="w-full bg-zinc-800 border border-cyan-500/30 rounded-2xl px-5 py-3"/>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Beschreibung</label>
          <textarea id="prod-desc" rows="4" class="w-full bg-zinc-800 border border-cyan-500/30 rounded-2xl px-5 py-3"></textarea>
        </div>
        <div class="flex items-center gap-3">
          <input type="checkbox" id="prod-available" checked class="w-5 h-5"/>
          <label for="prod-available">Produkt verfügbar</label>
        </div>
        <div class="flex items-center gap-3">
          <input type="checkbox" id="prod-isnew" class="w-5 h-5"/>
          <label for="prod-isnew">Als NEU markieren</label>
        </div>
      </div>

      <div class="mt-10 flex gap-4">
        <button onclick="saveProduct()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-5 rounded-2xl font-bold text-xl">
          Speichern
        </button>
        <button id="delete-prod-btn" onclick="deleteProduct()" class="bg-red-600/70 hover:bg-red-600 px-8 py-5 rounded-2xl font-bold hidden">
          Löschen
        </button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="admin-toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-zinc-900 border border-cyan-500/30 text-cyan-300 px-8 py-4 rounded-2xl shadow-2xl hidden z-50 whitespace-nowrap">
    Meldung
  </div>

  <script>
    // ────────────────────────────────────────────────
    //  KONFIGURATION
    // ────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyDsIUl-iYmH42MPbusFLhGhj5oGLh01BzI",
      authDomain: "wavevapes-7a960.firebaseapp.com",
      projectId: "wavevapes-7a960",
      storageBucket: "wavevapes-7a960.firebasestorage.app",
      messagingSenderId: "1093624390275",
      appId: "1:1093624390275:web:b1b8ae17bcf1b59dffb1b6"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const ALLOWED_ADMIN_EMAILS = [
      "jakob.hellrung@gmail.com",
      "stacy_berg@icloud.com"
    ];

    let editingProductId = null;

    // ────────────────────────────────────────────────
    //  AUTH
    // ────────────────────────────────────────────────
    auth.onAuthStateChanged(user => {
      if (user) {
        if (!ALLOWED_ADMIN_EMAILS.includes(user.email)) {
          alert("Diese E-Mail ist nicht als Admin freigeschaltet.");
          auth.signOut();
          return;
        }
        document.getElementById("current-admin").textContent = user.email;
        document.getElementById("auth-modal").classList.add("hidden");
        loadAdminData();
      } else {
        document.getElementById("auth-modal").classList.remove("hidden");
      }
    });

    function adminLogin() {
      const email = document.getElementById("admin-email").value.trim();
      const pw    = document.getElementById("admin-password").value;

      if (!ALLOWED_ADMIN_EMAILS.includes(email)) {
        document.getElementById("admin-error").textContent = "Keine Berechtigung (E-Mail nicht erlaubt)";
        return;
      }

      auth.signInWithEmailAndPassword(email, pw)
        .catch(err => {
          document.getElementById("admin-error").textContent = err.message;
        });
    }

    function adminLogout() {
      auth.signOut();
    }

    // ────────────────────────────────────────────────
    //  TABS
    // ────────────────────────────────────────────────
    function showTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById(`tab-${tabId}`).classList.remove('hidden');

      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('tab-active', 'border-cyan-400');
      });
      document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('tab-active', 'border-cyan-400');
    }

    // ────────────────────────────────────────────────
    //  PRODUKTE + BESTELLUNGEN + STATS
    // ────────────────────────────────────────────────
    function loadAdminData() {
      // Produkte live laden
      db.collection("products").onSnapshot(snap => {
        const grid = document.getElementById("admin-products-grid");
        grid.innerHTML = "";
        snap.forEach(doc => {
          const p = doc.data();
          const card = document.createElement("div");
          card.className = "admin-card rounded-2xl p-5 hover:shadow-xl transition cursor-pointer";
          card.innerHTML = `
            <div class="font-bold text-lg mb-2">${p.name || "Kein Name"}</div>
            <div class="text-sm text-gray-400 mb-3">${p.category || "?"}</div>
            <div class="flex justify-between text-sm mb-3">
              <span>Preis:</span><strong>${(p.price||0).toFixed(2)} €</strong>
            </div>
            <div class="flex justify-between text-sm mb-4">
              <span>Bestand:</span><strong class="${p.stock <= 5 ? 'text-amber-400' : p.stock === 0 ? 'text-red-400' : 'text-emerald-400'}">${p.stock || 0}</strong>
            </div>
            <div class="flex gap-3">
              <button onclick="editProduct('${doc.id}')" class="flex-1 bg-blue-600/70 hover:bg-blue-600 py-2 rounded-xl text-sm">
                Bearbeiten
              </button>
            </div>
          `;
          grid.appendChild(card);
        });
      });

      // Bestellungen
      db.collection("orders")
        .orderBy("date", "desc")
        .onSnapshot(snap => {
          const list = document.getElementById("admin-orders-list");
          list.innerHTML = "";
          let revenue = 0;
          let pending = 0;

          snap.forEach(doc => {
            const o = doc.data();
            revenue += o.total || 0;
            if (o.status === "Zahlung erwartet" || o.status === "Wird bearbeitet") pending++;

            const item = document.createElement("div");
            item.className = "admin-card rounded-2xl p-6";
            item.innerHTML = `
              <div class="flex justify-between items-start mb-4 flex-wrap gap-4">
                <div>
                  <div class="font-mono text-xl text-cyan-300">${o.orderNumber}</div>
                  <div class="text-sm text-gray-400">${o.date?.toDate?.()?.toLocaleString('de-DE') || '—'}</div>
                  <div class="text-sm mt-1">${o.userEmail}</div>
                </div>
                <select onchange="updateOrderStatus('${doc.id}', this.value)" class="status-badge ${getStatusClass(o.status)} px-4 py-1.5 rounded-full text-sm font-medium">
                  <option ${o.status==="Zahlung erwartet"?"selected":""}>Zahlung erwartet</option>
                  <option ${o.status==="Wird bearbeitet"?"selected":""}>Wird bearbeitet</option>
                  <option ${o.status==="Versendet"?"selected":""}>Versendet</option>
                  <option ${o.status==="Zugestellt"?"selected":""}>Zugestellt</option>
                  <option ${o.status==="Storniert"?"selected":""}>Storniert</option>
                </select>
              </div>

              <div class="mb-4">
                ${o.items?.map(i => `
                  <div class="flex justify-between text-sm py-1">
                    <span>${i.name} × ${i.qty}${i.nicotine ? ` (${i.nicotine})` : ''}</span>
                    <span>${(i.price * i.qty).toFixed(2)} €</span>
                  </div>
                `).join('') || '<p class="text-gray-500">Keine Artikel</p>'}
              </div>

              <div class="flex justify-between font-bold text-lg border-t border-white/10 pt-4">
                <span>Gesamt</span>
                <span class="text-emerald-400">${(o.total||0).toFixed(2)} €</span>
              </div>

              <div class="mt-5 pt-4 border-t border-white/10">
                <label class="block text-sm text-gray-400 mb-2">Tracking-Nummer (DHL)</label>
                <div class="flex gap-3">
                  <input type="text" value="${o.trackingNumber||''}" id="track-${doc.id}" class="flex-1 bg-zinc-800 border border-cyan-500/30 rounded-xl px-4 py-2.5 text-sm"/>
                  <button onclick="saveTracking('${doc.id}')" class="bg-cyan-600 hover:bg-cyan-500 px-5 py-2.5 rounded-xl text-sm">
                    Speichern
                  </button>
                </div>
              </div>
            `;
            list.appendChild(item);
          });

          document.getElementById("total-revenue").textContent = revenue.toFixed(2) + " €";
          document.getElementById("pending-orders").textContent = pending;
        });

      // Loyalty-Summe
      db.collection("users").onSnapshot(snap => {
        let sum = 0;
        snap.forEach(doc => {
          sum += doc.data().totalBonusPoints || 0;
        });
        document.getElementById("total-loyalty").textContent = sum;
      });
    }

    function getStatusClass(s) {
      return {
        "Zahlung erwartet": "status-Zahlung",
        "Wird bearbeitet": "status-Wird",
        "Versendet": "status-Versendet",
        "Zugestellt": "status-Zugestellt",
        "Storniert": "status-Storniert"
      }[s] || "";
    }

    // ────────────────────────────────────────────────
    //  PRODUKT MODAL FUNKTIONEN
    // ────────────────────────────────────────────────
    function openProductModal() {
      editingProductId = null;
      document.getElementById("modal-title").textContent = "Neues Produkt";
      document.getElementById("delete-prod-btn").classList.add("hidden");

      document.getElementById("prod-name").value = "";
      document.getElementById("prod-category").value = "Normale Sorten";
      document.getElementById("prod-price").value = "7.99";
      document.getElementById("prod-stock").value = "50";
      document.getElementById("prod-image").value = "";
      document.getElementById("prod-desc").value = "";
      document.getElementById("prod-available").checked = true;
      document.getElementById("prod-isnew").checked = false;

      document.getElementById("product-modal").classList.remove("hidden");
    }

    function editProduct(id) {
      db.collection("products").doc(id).get().then(doc => {
        if (!doc.exists) return;
        const p = doc.data();
        editingProductId = id;
        document.getElementById("modal-title").textContent = "Produkt bearbeiten";
        document.getElementById("delete-prod-btn").classList.remove("hidden");

        document.getElementById("prod-name").value     = p.name || "";
        document.getElementById("prod-category").value = p.category || "Normale Sorten";
        document.getElementById("prod-price").value    = p.price || "7.99";
        document.getElementById("prod-stock").value    = p.stock || "0";
        document.getElementById("prod-image").value    = p.image || "";
        document.getElementById("prod-desc").value     = p.description || "";
        document.getElementById("prod-available").checked = p.available !== false;
        document.getElementById("prod-isnew").checked  = !!p.isNew;

        document.getElementById("product-modal").classList.remove("hidden");
      });
    }

    function closeProductModal() {
      document.getElementById("product-modal").classList.add("hidden");
    }

    function saveProduct() {
      const data = {
        name:        document.getElementById("prod-name").value.trim(),
        category:    document.getElementById("prod-category").value,
        price:       Number(document.getElementById("prod-price").value) || 7.99,
        stock:       Number(document.getElementById("prod-stock").value) || 0,
        image:       document.getElementById("prod-image").value.trim(),
        description: document.getElementById("prod-desc").value.trim(),
        available:   document.getElementById("prod-available").checked,
        isNew:       document.getElementById("prod-isnew").checked,
        updatedAt:   firebase.firestore.FieldValue.serverTimestamp()
      };

      if (!data.name) {
        alert("Bitte mindestens einen Namen eingeben.");
        return;
      }

      const ref = editingProductId
        ? db.collection("products").doc(editingProductId)
        : db.collection("products").doc();

      ref.set(data, { merge: true })
        .then(() => {
          showToast("Produkt gespeichert ✓");
          closeProductModal();
        })
        .catch(err => alert("Fehler: " + err.message));
    }

    function deleteProduct() {
      if (!editingProductId) return;
      if (!confirm("Produkt wirklich löschen?")) return;

      db.collection("products").doc(editingProductId).delete()
        .then(() => {
          showToast("Produkt gelöscht");
          closeProductModal();
        })
        .catch(err => alert(err.message));
    }

    // ────────────────────────────────────────────────
    //  BESTELL STATUS & TRACKING
    // ────────────────────────────────────────────────
    function updateOrderStatus(orderId, newStatus) {
      db.collection("orders").doc(orderId).update({
        status: newStatus,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(() => {
        showToast(`Status → ${newStatus}`);
      });
    }

    function saveTracking(orderId) {
      const val = document.getElementById(`track-${orderId}`).value.trim();
      db.collection("orders").doc(orderId).update({
        trackingNumber: val,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }).then(() => {
        showToast("Tracking gespeichert");
      });
    }

    // ────────────────────────────────────────────────
    //  TOAST
    // ────────────────────────────────────────────────
    function showToast(msg, duration = 3000) {
      const t = document.getElementById("admin-toast");
      t.textContent = msg;
      t.classList.remove("hidden");
      setTimeout(() => t.classList.add("hidden"), duration);
    }

    // Initial
    showTab('products');
  </script>
</body>
</html>
