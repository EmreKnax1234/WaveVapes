<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WaveVapes – Disposable Vapes & Liquids</title>
    <meta name="description" content="WaveVapes Shop – Disposable Vapes bis 30000 Puffs und Premium Liquids online.">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1e1233, #0a0a0a);
            color: white;
            min-height: 100vh;
        }
        .neon-text { text-shadow: 0 0 15px #67e8f9, 0 0 30px #67e8f9; }
        .product-card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 1rem;
            overflow: hidden;
            transition: all 0.3s;
        }
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -10px rgba(103,232,249,0.25);
        }
        .tab-active { border-bottom: 4px solid #67e8f9 !important; color: #67e8f9 !important; font-weight: 600; }
        .qty-btn { transition: all 0.2s; }
        .qty-btn:hover { background: #22d3ee; color: black; }
        .loyalty-bar { height: 8px; background: linear-gradient(to right, #67e8f9, #a5f3fc); border-radius: 9999px; transition: width 0.6s; }
        #notification-toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); color: #67e8f9;
            padding: 12px 24px; border-radius: 9999px; font-size: 14px; opacity: 0;
            transition: all 0.5s; z-index: 9999; max-width: 90%;
        }
        #notification-toast.visible { opacity: 1; transform: translateX(-50%) translateY(-10px); }
        .price-row { display: flex; align-items: baseline; justify-content: center; gap: 12px; margin: 12px 0; }
        .discount-price { text-decoration: line-through; color: #9ca3af; font-size: 1.1rem; }
        .sale-price { color: #ef4444; font-weight: 700; font-size: 1.6rem; }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="bg-black/90 border-b border-cyan-800/40 sticky top-0 z-50 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <h1 class="text-3xl sm:text-4xl font-bold tracking-tighter neon-text">WAVEVAPES</h1>
        </div>
        <div class="flex items-center gap-4 sm:gap-8">
            <button onclick="showAuthModal()" class="flex items-center gap-2 px-4 py-2 rounded-full bg-zinc-900 border border-cyan-500/30 hover:bg-zinc-800 transition">
                <i class="fa-solid fa-user text-cyan-300"></i>
                <span id="current-user-display">Account</span>
            </button>
            <button onclick="toggleCart()" class="relative bg-gradient-to-r from-cyan-500 to-purple-600 text-white px-5 py-2 rounded-full font-medium hover:brightness-110 transition">
                <i class="fa-solid fa-cart-shopping mr-2"></i>Warenkorb
                <span id="cart-count-badge" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold w-6 h-6 rounded-full flex items-center justify-center">0</span>
            </button>
        </div>
    </div>
</nav>

<div class="max-w-7xl mx-auto px-4 sm:px-6 py-10">

    <!-- TABS -->
    <div id="category-tabs" class="flex flex-wrap justify-center gap-4 mb-10 text-lg font-medium"></div>

    <!-- SEARCH -->
    <div class="relative max-w-xl mx-auto mb-12">
        <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-cyan-400"></i>
        <input id="search-input" type="text" placeholder="Nach Geschmack suchen..." onkeyup="filterProducts()"
               class="w-full bg-zinc-900 border border-zinc-700 rounded-full pl-12 pr-6 py-4 text-lg outline-none focus:border-cyan-500 transition">
    </div>

    <!-- PRODUCTS -->
    <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>

    <!-- LOYALTY BANNER -->
    <div class="mt-16 bg-gradient-to-r from-zinc-900 to-purple-950 border border-cyan-500/30 rounded-2xl p-6 text-center">
        <h3 class="text-2xl font-bold mb-4 neon-text">Loyalty Punkte</h3>
        <div class="flex justify-center items-center gap-6">
            <div>
                <div class="text-4xl font-bold text-yellow-400" id="loyalty-points">0</div>
                <div class="text-sm text-gray-400">Punkte</div>
            </div>
            <div class="w-48 bg-zinc-800 rounded-full h-3 overflow-hidden">
                <div id="loyalty-progress" class="loyalty-bar w-0 h-full transition-all"></div>
            </div>
        </div>
        <p id="loyalty-next" class="mt-3 text-sm text-emerald-400"></p>
    </div>

</div>

<!-- CART SIDEBAR -->
<div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full md:w-96 bg-zinc-950 border-l border-cyan-500/30 transform translate-x-full transition-transform duration-300 z-50 overflow-y-auto">
    <div class="p-6">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-bold">Warenkorb</h2>
            <button onclick="toggleCart()" class="text-4xl text-gray-400 hover:text-white">×</button>
        </div>
        <div id="cart-items" class="space-y-6 mb-8"></div>
        <div class="border-t border-zinc-800 pt-6">
            <div class="flex justify-between text-xl font-bold mb-4">
                <span>Gesamt</span>
                <span id="cart-total">0,00 €</span>
            </div>
            <button onclick="placeOrder()" class="w-full py-4 bg-gradient-to-r from-cyan-500 to-purple-600 rounded-xl font-bold text-lg hover:brightness-110 transition">
                Jetzt kaufen
            </button>
        </div>
    </div>
</div>

<!-- AUTH MODAL -->
<div id="auth-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-2xl p-8 w-full max-w-md mx-4">
        <div class="flex justify-between items-center mb-6">
            <h2 id="auth-title" class="text-3xl font-bold">Anmelden</h2>
            <button onclick="closeAuthModal()" class="text-3xl text-gray-400 hover:text-white">×</button>
        </div>

        <div class="flex border-b border-zinc-700 mb-6">
            <button onclick="switchTab('login')" class="flex-1 py-3 tab-btn tab-active">Login</button>
            <button onclick="switchTab('register')" class="flex-1 py-3 tab-btn">Registrieren</button>
        </div>

        <div id="login-form">
            <input id="login-email" type="email" placeholder="E-Mail" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 mb-4 focus:outline-none focus:border-cyan-500">
            <input id="login-password" type="password" placeholder="Passwort" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 mb-6 focus:outline-none focus:border-cyan-500">
            <button onclick="login()" class="w-full bg-cyan-600 hover:bg-cyan-500 py-3 rounded-lg font-bold">Einloggen</button>
        </div>

        <div id="register-form" class="hidden">
            <input id="reg-email" type="email" placeholder="E-Mail" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 mb-4 focus:outline-none focus:border-cyan-500">
            <input id="reg-password" type="password" placeholder="Passwort (min. 6 Zeichen)" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 mb-6 focus:outline-none focus:border-cyan-500">
            <button onclick="register()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-lg font-bold">Konto erstellen</button>
        </div>

        <div id="logged-in-view" class="hidden text-center">
            <i class="fa-solid fa-circle-user text-6xl text-cyan-400 mb-4"></i>
            <p id="logged-in-email" class="text-xl mb-4"></p>
            <button onclick="logout()" class="w-full bg-red-600 hover:bg-red-500 py-3 rounded-lg font-bold">Ausloggen</button>
        </div>
    </div>
</div>

<script>
// ────────────────────────────────────────────────
//  KONFIG & FIREBASE
// ────────────────────────────────────────────────
const firebaseConfig = {
    apiKey: "AIzaSyDsIUl-iYmH42MPbusFLhGhj5oGLh01BzI",
    authDomain: "wavevapes-7a960.firebaseapp.com",
    projectId: "wavevapes-7a960",
    storageBucket: "wavevapes-7a960.firebasestorage.app",
    messagingSenderId: "1093624390275",
    appId: "1:1093624390275:web:b1b8ae17bcf1b59dffb1b6",
    measurementId: "G-B8T2B657LL"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let cart = [];
let allProducts = [];
let currentCategoryFilter = "Alle";
let loyaltyPoints = parseInt(localStorage.getItem("loyaltyPoints")) || 0;
let appliedDiscount = 0;

// ────────────────────────────────────────────────
//  PRODUKTE LADEN (LIVE)
// ────────────────────────────────────────────────
function loadProducts() {
    db.collection("products")
        .where("active", "==", true)
        .onSnapshot(snap => {
            allProducts = snap.docs.map(doc => ({
                id: doc.id,
                ...doc.data(),
                available: (doc.data().stock || 0) > 0
            }));
            renderCategoryTabs();
            renderProducts();
        });
}

// ────────────────────────────────────────────────
//  KATEGORIEN (hartcodiert + Prüfung)
// ────────────────────────────────────────────────
function renderCategoryTabs() {
    const tabs = [
        { name: "Alle", key: "Alle" },
        { name: "WaveVapes Tornado 30000", key: "WaveVapes Tornado 30000", special: true },
        { name: "Normale Sorten", key: "Normale Sorten" },
        { name: "Neue Sorten", key: "Neue Sorten" }
    ];

    let html = tabs.map(t => {
        const active = currentCategoryFilter === t.key ? "tab-active bg-cyan-900/30" : "hover:bg-zinc-800";
        const special = t.special ? '<i class="fa-solid fa-bolt text-yellow-400 animate-bolt ml-2"></i>' : '';
        return `<button onclick="setCategoryFilter('${t.key}')" class="px-6 py-3 rounded-lg transition ${active}">${t.name}${special}</button>`;
    }).join("");

    document.getElementById("category-tabs").innerHTML = html;
}

function setCategoryFilter(cat) {
    currentCategoryFilter = cat;
    renderCategoryTabs();
    renderProducts();
}

// ────────────────────────────────────────────────
//  PRODUKTE RENDER
// ────────────────────────────────────────────────
function renderProducts() {
    const grid = document.getElementById("products-grid");
    const term = document.getElementById("search-input")?.value?.toLowerCase() || "";

    const filtered = allProducts.filter(p => {
        if (currentCategoryFilter !== "Alle" && p.category !== currentCategoryFilter) return false;
        if (term && !p.name.toLowerCase().includes(term)) return false;
        return true;
    });

    let html = "";
    filtered.forEach(p => {
        const inCart = cart.find(i => i.id === p.id);
        const qty = inCart?.qty || 0;

        html += `
            <div class="product-card p-5">
                <h4 class="font-semibold text-lg mb-3">${p.name}</h4>
                <div class="price-row mb-4">
                    <span class="discount-price">${(p.price * 1.25).toFixed(2)} €</span>
                    <span class="sale-price">${p.price.toFixed(2)} €</span>
                </div>
                ${p.category !== "WaveVapes Tornado 30000" ? `
                <select class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-2 mb-4" onchange="updateNicotine('${p.id}', this.value)">
                    <option>10 mg</option>
                    <option selected>20 mg</option>
                </select>` : ''}
                <div class="flex justify-center items-center bg-zinc-800 rounded-full">
                    <button onclick="changeQuantity('${p.id}', -1)" class="qty-btn w-12 h-12 text-2xl">-</button>
                    <span class="w-12 text-center font-bold text-xl">${qty}</span>
                    <button onclick="changeQuantity('${p.id}', 1)" class="qty-btn w-12 h-12 text-2xl">+</button>
                </div>
            </div>
        `;
    });

    grid.innerHTML = html || '<p class="col-span-full text-center py-20 text-gray-400">Keine Produkte gefunden</p>';
}

// ────────────────────────────────────────────────
//  WARENKORB LOGIK
// ────────────────────────────────────────────────
function changeQuantity(id, delta) {
    const p = allProducts.find(pr => pr.id === id);
    if (!p || !p.available) return;

    let item = cart.find(i => i.id === id);
    if (!item) {
        item = { id, name: p.name, qty: 0, price: p.price, nicotine: "20 mg" };
        cart.push(item);
    }

    item.qty = Math.max(0, item.qty + delta);
    if (item.qty === 0) cart = cart.filter(i => i.id !== id);

    check4for3();
    updateCartDisplay();
    renderProducts();
}

function updateNicotine(id, val) {
    const item = cart.find(i => i.id === id);
    if (item) item.nicotine = val;
    updateCartDisplay();
}

function check4for3() {
    const count = cart.reduce((s, i) => {
        const p = allProducts.find(pr => pr.id === i.id);
        return s + (p?.category === "WaveVapes Tornado 30000" ? i.qty : 0);
    }, 0);

    if (count >= 4 && count % 4 === 0) showToast("⚡ 4 für 3 aktiviert!");
}

function updateCartDisplay() {
    let itemsHTML = "";
    let total = 0;
    let count = 0;

    cart.forEach(item => {
        const price = item.price || 7.99;
        total += item.qty * price;
        count += item.qty;

        itemsHTML += `
            <div class="flex justify-between items-center bg-zinc-800 p-4 rounded-lg">
                <div>
                    <div>${item.name} ${item.nicotine ? `(${item.nicotine})` : ''}</div>
                    <div class="text-sm text-gray-400">${item.qty} × ${price.toFixed(2)} €</div>
                </div>
                <div class="font-bold">${(item.qty * price).toFixed(2)} €</div>
            </div>
        `;
    });

    document.getElementById("cart-items").innerHTML = itemsHTML || "<p class='text-center text-gray-400 py-8'>Warenkorb ist leer</p>";
    document.getElementById("cart-total").textContent = total.toFixed(2) + " €";
    document.getElementById("cart-count-badge").textContent = count;
}

// ────────────────────────────────────────────────
//  AUTHENTIFIZIERUNG
// ────────────────────────────────────────────────
function showAuthModal() {
    document.getElementById("auth-modal").classList.remove("hidden");
}

function closeAuthModal() {
    document.getElementById("auth-modal").classList.add("hidden");
}

function switchTab(type) {
    document.getElementById("login-form").classList.toggle("hidden", type !== "login");
    document.getElementById("register-form").classList.toggle("hidden", type !== "register");
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("tab-active"));
    event.target.classList.add("tab-active");
}

async function login() {
    const email = document.getElementById("login-email").value;
    const pw = document.getElementById("login-password").value;
    try {
        await auth.signInWithEmailAndPassword(email, pw);
        closeAuthModal();
        showToast("Erfolgreich eingeloggt");
    } catch (e) {
        alert("Login fehlgeschlagen: " + e.message);
    }
}

async function register() {
    const email = document.getElementById("reg-email").value;
    const pw = document.getElementById("reg-password").value;
    if (pw.length < 6) return alert("Passwort mind. 6 Zeichen");
    try {
        await auth.createUserWithEmailAndPassword(email, pw);
        closeAuthModal();
        showToast("Konto erstellt");
    } catch (e) {
        alert("Registrierung fehlgeschlagen: " + e.message);
    }
}

function logout() {
    auth.signOut();
    showToast("Ausgeloggt");
}

// ────────────────────────────────────────────────
//  LOYALTY SYSTEM
// ────────────────────────────────────────────────
function updateLoyalty() {
    document.getElementById("loyalty-points").textContent = loyaltyPoints;

    const nextReward = loyaltyPoints < 300 ? 300 : loyaltyPoints < 600 ? 600 : 9999;
    const progress = Math.min(100, (loyaltyPoints / nextReward) * 100);
    document.getElementById("loyalty-progress").style.width = progress + "%";

    document.getElementById("loyalty-next").textContent = 
        loyaltyPoints >= 600 ? "Du hast alle Boni freigeschaltet!" :
        loyaltyPoints >= 300 ? "Nächster Bonus bei 600 Punkten" :
        `Noch ${300 - loyaltyPoints} Punkte bis 5€ Gutschein`;
}

function addLoyalty(amount) {
    loyaltyPoints += Math.floor(amount);
    localStorage.setItem("loyaltyPoints", loyaltyPoints);
    updateLoyalty();

    // Automatische Gutschein-Einlösung
    if (loyaltyPoints >= 300 && !appliedDiscount) {
        if (confirm("300 Punkte erreicht! 5€ Gutschein einlösen?")) {
            appliedDiscount = 5;
            showToast("5€ Gutschein aktiviert!");
        }
    }
}

// ────────────────────────────────────────────────
//  INITIALIZE
// ────────────────────────────────────────────────
auth.onAuthStateChanged(user => {
    currentUser = user;
    document.getElementById("current-user-display").textContent = user ? user.email.split('@')[0] : "Account";
});

function initialize() {
    loadProducts();
    updateLoyalty();
}

window.addEventListener("load", initialize);
</script>
</body>
</html>
