        // ====================== ABANDONED CART EMAIL (JETZT KORRIGIERT) ======================
        async function sendAbandonedCartEmail() {
            if (!currentUser || cart.length === 0) {
                showToast("Kein User oder leerer Warenkorb", "error");
                return;
            }

            const userName = localStorage.getItem("wavevapes_username") || currentUser.email.split('@')[0];
            const cartData = cart.map(item => {
                const prod = allProducts.find(p => p.id === item.id);
                return {
                    name: item.name,
                    qty: item.qty,
                    price: (item.price || 7.99).toFixed(2),
                    itemTotal: (item.qty * (item.price || 7.99)).toFixed(2),
                    image_url: prod && prod.image ? prod.image : "https://wavevapes.de/logo.png",
                    nicotine: item.nicotine || ""
                };
            });

            const subtotal = getSubtotal().toFixed(2);
            const total = calculateCartTotal().toFixed(2);
            const freeShippingMissing = Math.max(0, FREE_SHIPPING_THRESHOLD - getProductTotal());
            const mysteryMissing = Math.max(0, 100 - getSubtotal());
            const loyaltyPointsEarned = Math.floor(getProductTotal());
            const tornadoQty = getTornadoQuantity();
            const hasTornado = tornadoQty > 0;
            const freeTornados = Math.floor(tornadoQty / 4);

            const payload = {
                email: currentUser.email,                    // ← WICHTIG: Das war der Fehler!
                userName: userName,
                subtotal: subtotal,
                total: total,
                freeShippingMissing: freeShippingMissing > 0 ? freeShippingMissing.toFixed(2) : "",
                mysteryMissing: mysteryMissing > 0 ? mysteryMissing.toFixed(2) : "",
                loyaltyPoints: loyaltyPointsEarned.toString(),
                hasTornado: hasTornado,
                freeTornados: freeTornados.toString(),
                cartItems: cartData
            };

            console.log("📧 Sende Abandoned-Cart mit Payload:", JSON.stringify(payload, null, 2));

            try {
                const response = await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_ABANDONED_TEMPLATE, payload);

                showToast("✅ „Was im Warenkorb vergessen“ E-Mail erfolgreich gesendet!", "success");

            } catch (e) {
                console.error("❌ FULL EmailJS Abandoned Error:", e);

                showToast(`❌ Abandoned-Cart-E-Mail Fehler:<br>${errorMsg}<br><small>Öffne F12 → Console für Details</small>`, "error");
            }
        }

        function checkAbandonedCart() {
            const lastSent = parseInt(localStorage.getItem("abandoned_reminder_sent") || "0");
            const timeSinceLast = Date.now() - lastSent;
            if (cart.length > 0 && timeSinceLast > 1800000) {
                sendAbandonedCartEmail();
            }

        // ====================== ALLE ANDEREN FUNKTIONEN (REFERRAL, AUTH, PRODUCTS, CART, etc.) ======================
        // (Der komplette Rest deines Original-Codes – unverändert und vollständig)

        async function createOrUpdateUserProfile() {
            if (!currentUser) return;
            const userRef = db.collection("users").doc(currentUser.uid);
            const doc = await userRef.get();
            if (!doc.exists) {
                myReferralCode = "WV-" + Math.random().toString(36).substring(2,8).toUpperCase();
                const urlParams = new URLSearchParams(window.location.search);
                const refCode = urlParams.get("ref");
                await userRef.set({
                    email: currentUser.email,
                    username: localStorage.getItem("wavevapes_username") || currentUser.email.split('@')[0],
                    referralCode: myReferralCode,
                    referredBy: refCode || null,
                    referralCount: 0,
                    totalBonusPoints: 0,
                    redeemedLoyaltyCodes: [],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                if (refCode) {
                    addLoyaltyPoints(50);
                    await applyReferralBonusToReferrer(refCode);
                    showToast("🎉 +50 Punkte Willkommensbonus durch Referral!");
                }
            } else {
                const data = doc.data();
                if (!data.referralCode) {
                    myReferralCode = "WV-" + Math.random().toString(36).substring(2,8).toUpperCase();
                    await userRef.update({ referralCode: myReferralCode });
                    showToast("✅ Dein Referral-Code wurde nachträglich erstellt!");
                } else {
                    myReferralCode = data.referralCode;
                }
            }
            db.collection("users").doc(currentUser.uid).onSnapshot(doc => {
                if (doc.exists) myReferralCode = doc.data().referralCode || "";
            });
        }

        async function applyReferralBonusToReferrer(refCode) {
            const snapshot = await db.collection("users").where("referralCode", "==", refCode).limit(1).get();
            if (!snapshot.empty) {
                const referrerRef = snapshot.docs[0].ref;
                await referrerRef.update({
                    referralCount: firebase.firestore.FieldValue.increment(1),
                    totalBonusPoints: firebase.firestore.FieldValue.increment(100)
                });
            }
        }

            if (!currentUser) {

                showToast("Referral-Code wird erstellt...");

            if (!myReferralCode) {
                showToast("Fehler beim Erstellen des Codes.<br>Bitte Seite neu laden.", "error");

            const link = `https://wavevapes.de/?ref=${myReferralCode}`;
            await navigator.clipboard.writeText(link);
            showToast(`✅ Referral-Link kopiert!<br><span class="text-xs">${link}</span>`);

            document.getElementById("login-form").classList.toggle("hidden", tab !== 0);

        async function applyDiscountCode() {
            const input = document.getElementById("discount-input").value.trim().toUpperCase();
            const status = document.getElementById("discount-status");
            if (!input) {
                status.innerHTML = `<span class="text-red-400">Code eingeben</span>`;
                return;
            }
            if (!currentUser) {
                status.innerHTML = `<span class="text-red-400">Bitte zuerst einloggen</span>`;
                showAuthModal();
                return;
            }
            const d = VALID_DISCOUNTS[input];
            if (!d) {
                status.innerHTML = `<span class="text-red-400">Ungültiger Code</span>`;
                return;
            }
            const isLoyaltyCode = input.startsWith("LOYAL");
            if (isLoyaltyCode) {
                try {
                    const userRef = db.collection("users").doc(currentUser.uid);
                    const userDoc = await userRef.get();
                    if (!userDoc.exists) {
                        status.innerHTML = `<span class="text-red-400">Benutzerprofil nicht gefunden</span>`;
                        return;
                    }
                    const redeemed = userDoc.data().redeemedLoyaltyCodes || [];
                    if (redeemed.includes(input)) {
                        status.innerHTML = `<span class="text-red-400">Dieser Loyalty-Code wurde bereits eingelöst!</span>`;
                        return;
                    }
                    appliedDiscount = { code: input, type: d.type, value: d.value };
                    await userRef.update({
                        redeemedLoyaltyCodes: firebase.firestore.FieldValue.arrayUnion(input)
                    });
                    const display = d.type === "fixed" ? `${d.value} €` : `${d.value}%`;
                    status.innerHTML = `<span class="text-emerald-400">✓ ${input} (${display}) eingelöst!</span>`;
                    updateCartDisplay();
                } catch (err) {
                    console.error(err);
                    status.innerHTML = `<span class="text-red-400">Fehler: ${err.message}</span>`;
                }
            } else {
                appliedDiscount = { code: input, type: d.type, value: d.value };
                const display = d.type === "fixed" ? `${d.value} €` : `${d.value}%`;
                status.innerHTML = `<span class="text-emerald-400">✓ ${input} (${display}) eingelöst!</span>`;
                updateCartDisplay();
            }
        }

        function checkAndAutoRedeemLoyalty() {

                    const alreadyRedeemed = currentUser ? (localStorage.getItem(`redeemed_${r.code}`) === "true") : false;
                    if (!alreadyRedeemed) {
                        if (confirm(`🎉 Du hast genug Punkte für ${r.text}!\nJetzt einlösen?`)) {
                            document.getElementById("discount-input").value = r.code;
                            applyDiscountCode();

                        }
                    }
                }
            }
        }

        function getSubtotal() {
            return cart.reduce((sum, item) => item.id === MYSTERY_ID ? sum : sum + item.qty * (item.price || 7.99), 0);
        }

        function getProductTotal() {
            let subtotal = getSubtotal();
            const tornadoQty = getTornadoQuantity();
            const free = Math.floor(tornadoQty / 4);
            let total = Math.max(0, subtotal - free * 19.99);
            if (appliedDiscount) {
                if (appliedDiscount.type === "percent") {
                    total = Math.max(0, total - total * appliedDiscount.value / 100);
                } else {
                    total = Math.max(0, total - appliedDiscount.value);
                }
            }
            return total;
        }

        function getShippingCost() {
            return getProductTotal() >= FREE_SHIPPING_THRESHOLD ? 0 : SHIPPING_COST;
        }

        function calculateCartTotal() {
            return getProductTotal() + getShippingCost();
        }

        async function loadProducts() {
            const container = document.getElementById("products-grid");
            container.innerHTML = `<p class="col-span-full text-center py-16 text-gray-400 flex items-center justify-center gap-3"><i class="fa-solid fa-spinner animate-spin text-2xl"></i> Live-Stock wird geladen...</p>`;
            if (productsUnsubscribe) productsUnsubscribe();
            productsUnsubscribe = db.collection("products").onSnapshot(snap => {
                allProducts = [];
                snap.forEach(doc => {
                    const data = doc.data();
                    allProducts.push({
                        id: doc.id,
                        name: data.name,
                        category: data.category,
                        isNew: data.isNew || false,
                        available: data.available !== false,
                        price: data.price || 7.99,
                        image: data.image || null,
                        stock: data.stock || 0,
                        description: data.description || ""
                    });
                });
                renderProducts();
            });
        }

        function getSortPriority(p) {
            if (currentCategoryFilter !== "Alle") return p.available ? 0 : 1;
            if (p.category === "WaveVapes Tornado 30000") return p.available ? 4 : 5;
            if (!p.available) return 3;
            if (p.isNew) return 2;
            return 1;
        }

        function renderProducts() {
            const container = document.getElementById("products-grid");
            const searchTerm = document.getElementById("search-input").value.toLowerCase().trim();
            let filtered = allProducts.filter(p => {
                const catMatch = currentCategoryFilter === "Alle" || p.category === currentCategoryFilter;
                const searchMatch = !searchTerm || p.name.toLowerCase().includes(searchTerm);
                return catMatch && searchMatch;
            });
            filtered.sort((a, b) => {
                const prioA = getSortPriority(a);
                const prioB = getSortPriority(b);
                if (prioA !== prioB) return prioA - prioB;
                return a.name.localeCompare(b.name);
            });
            let html = "";
            filtered.forEach(product => {
                const cartItem = cart.find(i => i.id === product.id);
                const qty = cartItem ? cartItem.qty : 0;
                const nicotine = cartItem?.nicotine || "20 mg";
                const isVape = product.category === "WaveVapes Tornado 30000";
                const imageHTML = product.image
                    ? `<img src="${product.image}" class="tornado-image" alt="${product.name} – WaveVapes Disposable Vape" loading="lazy" decoding="async" width="400" height="160">`
                    : `<div class="tornado-image bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center text-4xl">🧪</div>`;
                const oldPrice = isVape ? "35,99" : "10,99";
                const salePrice = product.price.toFixed(2).replace('.', ',');
                const unavailableClass = !product.available ? 'unavailable-product' : '';
                const liquidClass = !isVape ? 'liquid-card' : '';
                let unavailableTagHTML = !product.available ? `<div class="unavailable-tag">Aktuell NICHT verfügbar</div>` : '';
                let stockHTML = '';
                const stock = product.stock || 0;
                if (stock === 0 || !product.available) {
                    stockHTML = `<div class="stock-info stock-zero">❌ Ausverkauft</div>`;
                } else if (stock <= 5) {
                    stockHTML = `<div class="stock-info stock-low">⚠️ Nur noch ${stock} Stück!</div>`;
                } else {
                    stockHTML = `<div class="stock-info stock-high">✅ Noch ${stock} auf Lager</div>`;
                }
                let nicotineHTML = '';
                if (!isVape && product.available) {
                    nicotineHTML = `<select class="nicotine-select" onclick="event.stopImmediatePropagation()" onchange="updateNicotine('${product.id}', this.value); event.stopImmediatePropagation()">${NICOTINE_OPTIONS.map(opt => `<option value="${opt}" ${nicotine === opt ? 'selected' : ''}>${opt}</option>`).join('')}</select>`;
                }
                let qtyHTML = product.available ? `
                    <div class="flex items-center bg-zinc-800 rounded-3xl" onclick="event.stopImmediatePropagation()">
                        <button onclick="changeQuantity('${product.id}', -1); event.stopImmediatePropagation()" class="qty-btn w-9 h-9 text-2xl text-cyan-300 flex-1 flex items-center justify-center">-</button>
                        <div class="w-10 text-center font-bold text-xl flex items-center justify-center">${qty}</div>
                        <button onclick="changeQuantity('${product.id}', 1); event.stopImmediatePropagation()" class="qty-btn w-9 h-9 text-2xl text-cyan-300 flex-1 flex items-center justify-center">+</button>
                    </div>` : '';
                html += `
                    <div onclick="showProductDetail('${product.id}')"
                         class="product-card bg-zinc-900 border border-white/10 rounded-3xl overflow-hidden ${unavailableClass} ${liquidClass} cursor-pointer">
                        <div class="h-1.5 bg-gradient-to-r from-cyan-400 to-purple-500"></div>
                        <div class="p-5 flex flex-col h-full">
                            ${imageHTML}
                            <div class="flex items-start justify-between mb-3">
                                <h4 class="font-semibold text-lg leading-tight flex-1">${product.name}</h4>
                                ${product.isNew ? `<span class="ml-auto px-3 py-1 bg-lime-400 text-black text-xs font-black tracking-wider rounded-2xl">NEW</span>` : ''}
                            </div>
                            ${unavailableTagHTML}
                            ${stockHTML}
                            <div class="flex-1"></div>
                            <div class="price-row"><span class="discount-price">${oldPrice}€</span> → <span class="sale-price">${salePrice}€</span></div>
                            ${qtyHTML}
                            ${nicotineHTML}
                        </div>
                    </div>`;
            });
            container.innerHTML = html || `<p class="col-span-full text-center py-16 text-gray-400">Keine Produkte gefunden.</p>`;
        }

        function updateNicotine(id, value) {
            let item = cart.find(i => i.id === id);
            if (item) item.nicotine = value;
            updateCartDisplay();
        }

        function changeQuantity(id, delta) {
            const product = allProducts.find(p => p.id === id);
            if (!product) return;
            if (!product.available) {
                showToast("❌ Dieses Produkt ist momentan nicht verfügbar", "error");
                return;
            }
            let existing = cart.find(item => item.id === id);
            if (!existing) {
                existing = { id, name: product.name, qty: 0, price: product.price, nicotine: "20 mg" };
                cart.push(existing);
            }
            existing.qty = Math.max(0, existing.qty + delta);
            if (existing.qty === 0) cart = cart.filter(item => item.id !== id);
            manageMysteryVape();
            saveAbandonedCartToLocal();
            const newTornadoQty = getTornadoQuantity();
            if (newTornadoQty >= 4 && newTornadoQty % 4 === 0) showDealToast();
            updateCartDisplay();
            renderProducts();
        }

        function getTornadoQuantity() {
            return cart.reduce((sum, item) => {
                const prod = allProducts.find(p => p.id === item.id);
                return (prod && prod.category === "WaveVapes Tornado 30000") ? sum + item.qty : sum;
            }, 0);
        }

            notificationCyclePaused = true;

            toast.classList.add('visible');

        function updateCartDisplay() {
            const countEl = document.getElementById("cart-count-badge");
            const totalEl = document.getElementById("cart-total-price");
            const listEl = document.getElementById("cart-items-list");
            const shippingNote = document.getElementById("cart-shipping-note");
            const addressDisplay = document.getElementById("cart-address-display");
            const loyaltyCartInfo = document.getElementById("loyalty-cart-info");
            const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            countEl.textContent = totalItems;
            const grandTotal = calculateCartTotal();
            totalEl.textContent = `${grandTotal.toFixed(2).replace('.', ',')} €`;
            const shipping = getShippingCost();
            shippingNote.innerHTML = shipping === 0 ? `✅ Gratis Versand (ab 100 €)` : `+ ${shipping.toFixed(2).replace('.', ',')} € Versand`;
            const productTotal = getProductTotal();
            if (productTotal > 0) {
                const pointsEarned = Math.floor(productTotal);
                loyaltyCartInfo.innerHTML = `🎁 Mit diesem Kauf erhältst du <span class="font-bold">+${pointsEarned}</span> Loyalty-Punkte!`;
            } else {
                loyaltyCartInfo.innerHTML = "";
            }
            if (userAddress.street) {
                addressDisplay.innerHTML = `${userAddress.street}<br>${userAddress.zip} ${userAddress.city}`;
            } else {
                addressDisplay.innerHTML = `<span class="text-red-400">Noch keine Adresse angegeben</span>`;
            }
            if (cart.length === 0) {
                listEl.innerHTML = `<p class="text-center py-16 text-gray-400">Dein Warenkorb ist leer</p>`;
                return;
            }
            let itemsHTML = "";
            const tornadoQty = getTornadoQuantity();
            const free = Math.floor(tornadoQty / 4);
            if (free > 0) {
                itemsHTML += `<div class="bg-gradient-to-r from-amber-400 to-yellow-400 text-black p-6 rounded-3xl mb-6 text-center shadow-inner"><div class="flex items-center justify-center gap-3 text-2xl font-black">⚡ 4 FÜR 3 AKTION AKTIV!</div><p class="font-semibold text-base mt-2">Du bekommst <span class="underline">${free} Vape${free > 1 ? 's' : ''} gratis</span></p></div>`;
            }
            cart.forEach(item => {
                const p = item.price || 7.99;
                const nicDisplay = item.nicotine ? ` (${item.nicotine})` : '';
                if (item.id === MYSTERY_ID) {
                    itemsHTML += `<div class="mystery-item flex justify-between items-center rounded-3xl p-5"><div class="flex items-center gap-3"><i class="fa-solid fa-gift text-3xl"></i><div><div class="font-medium">${item.name}</div><div class="text-xs bg-white/30 px-3 py-0.5 rounded-full inline-block">GRATIS AB 100€</div></div></div><div class="text-right"><div class="font-bold text-xl text-emerald-900">0,00 €</div></div></div>`;
                } else {
                    itemsHTML += `<div class="flex justify-between items-center bg-zinc-900 border border-white/10 rounded-3xl p-5"><div><div class="font-medium">${item.name}${nicDisplay}</div><div class="text-xs text-gray-400">${item.qty} × ${p.toFixed(2).replace('.', ',')} €</div></div><div class="flex items-center gap-6"><div class="font-bold text-xl">${(item.qty * p).toFixed(2).replace('.', ',')} €</div><button onclick="removeCartItem('${item.id}'); event.stopImmediatePropagation()" class="text-red-400"><i class="fa-solid fa-trash"></i></button></div></div>`;
                }
            });
            listEl.innerHTML = itemsHTML;
        }

        function removeCartItem(id) {

        function manageMysteryVape() {
            const subtotal = getSubtotal();
            const hasMystery = cart.some(item => item.id === MYSTERY_ID);
            if (subtotal >= 100 && !hasMystery) {
                cart.push({ id: MYSTERY_ID, name: "Mystery Vape", qty: 1, price: 0 });
                showMysteryToast();
            } else if (subtotal < 100 && hasMystery) {
                cart = cart.filter(item => item.id !== MYSTERY_ID);
            }
            saveAbandonedCartToLocal();
        }

        function showMysteryToast() {
            const toast = document.getElementById('notification-toast');

        function generateOrderNumber() {
            const now = new Date();
            const dateStr = now.getFullYear().toString().slice(2) + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
            return `WV-${dateStr}-${Math.floor(1000 + Math.random() * 9000)}`;
        }

        async function placeOrder() {
            if (!currentUser) {
                alert("Bitte melde dich zuerst an!");
                showAuthModal();
                return;
            }
            if (cart.length === 0) return alert("Dein Warenkorb ist leer.");
            if (!userAddress.street) {
                alert("Bitte zuerst deine Lieferadresse eingeben!");
                showAddressModal();
                return;
            }
            for (let item of cart) {
                if (item.id === MYSTERY_ID) continue;
                const product = allProducts.find(p => p.id === item.id);
                if (product.stock < item.qty) {
                    alert(`Nicht genug Vorrat für ${item.name}! Verfügbar: ${product.stock}`);
                    return;
                }
            }
            const orderNumber = generateOrderNumber();
            const finalTotal = calculateCartTotal();
            const loyaltyEarned = Math.floor(getProductTotal());
            try {
                await db.collection("orders").add({
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    orderNumber: orderNumber,
                    items: cart.map(item => ({
                        id: item.id,
                        name: item.name,
                        qty: item.qty,
                        price: item.price || 7.99,
                        nicotine: item.nicotine || ""
                    })),
                    total: finalTotal,
                    address: userAddress,
                    date: firebase.firestore.Timestamp.now(),
                    status: "Zahlung erwartet",
                    trackingNumber: "",
                    carrier: "",
                    loyaltyEarned: loyaltyEarned,
                    loyaltyCredited: false
                });
                for (let item of cart) {
                    if (item.id === MYSTERY_ID) continue;
                    await db.collection("products").doc(item.id).update({
                        stock: firebase.firestore.FieldValue.increment(-item.qty),
                        sold: firebase.firestore.FieldValue.increment(item.qty)
                    });
                }
                await sendOrderConfirmationEmail({
                    userEmail: currentUser.email,
                    orderNumber: orderNumber,
                    total: finalTotal,
                    items: cart,
                    shipping: getShippingCost(),
                    loyaltyEarned: loyaltyEarned
                });
                showSuccessModal(orderNumber, finalTotal, loyaltyEarned);
                cart = [];
                appliedDiscount = null;
                document.getElementById("discount-status").innerHTML = "";
                localStorage.removeItem("abandoned_reminder_sent");
                saveAbandonedCartToLocal();
                await loadProducts();
                updateCartDisplay();
                renderProducts();
                toggleCart();
            } catch (e) {
                alert("Fehler beim Speichern: " + e.message);
            }
        }

            ordersUnsubscribe = db.collection("orders")
                .where("userId", "==", currentUser.uid)
                .orderBy("date", "desc")
                .onSnapshot((snap) => {
                    container.innerHTML = "";
                    if (snap.empty) {
                        document.getElementById("no-history").classList.remove("hidden");
                        return;
                    }
                    document.getElementById("no-history").classList.add("hidden");
                    snap.forEach(doc => {
                        const order = doc.data();
                        const dateStr = order.date ? order.date.toDate().toLocaleDateString('de-DE') : '—';
                        const status = order.status || "Zahlung erwartet";
                        const statusClass = getStatusClass(status);
                        let itemsHTML = order.items.map(item =>
                            `<div class="flex justify-between text-sm"><span>${item.name} × ${item.qty}</span><span>${item.nicotine ? '(' + item.nicotine + ')' : ''}</span></div>`
                        ).join('');
                        let trackingHTML = order.trackingNumber ? `
                            <div class="mt-5 pt-5 border-t border-white/10">
                                <p class="text-xs text-gray-400">Trackingnummer (${order.carrier || '—'})</p>
                                <p class="font-mono text-cyan-300 break-all">${order.trackingNumber}</p>
                            </div>` : '';
                        let trackButton = '';
                        if (order.carrier === "DHL" && order.trackingNumber) {
                            const url = `https://www.dhl.de/de/privatkunden/dhl-sendungsverfolgung.html?piececode=${encodeURIComponent(order.trackingNumber)}`;
                            trackButton = `
                                <a href="${url}" target="_blank" rel="noopener noreferrer"
                                   class="mt-4 w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium py-3.5 rounded-2xl text-center flex items-center justify-center gap-2 transition">
                                    <i class="fa-solid fa-truck"></i>
                                    Sendung verfolgen
                                </a>`;
                        }
                        const card = document.createElement("div");
                        card.className = "bg-zinc-900 border border-white/10 rounded-3xl p-6";
                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <div class="font-mono text-xl text-cyan-300">${order.orderNumber}</div>
                                    <div class="text-sm text-gray-400 mt-1">${dateStr}</div>
                                </div>
                                <span class="status-badge ${statusClass}">${status}</span>
                            </div>
                            <div class="mb-5">
                                <p class="text-xs uppercase text-gray-400 mb-2">Artikel</p>
                                <div class="space-y-1 text-gray-200">${itemsHTML}</div>
                            </div>
                            <div class="flex justify-between items-end mb-6">
                                <div>
                                    <p class="text-xs text-gray-400">Gesamt</p>
                                    <p class="text-2xl font-bold">${order.total.toFixed(2).replace('.', ',')} €</p>
                                </div>
                            </div>
                            ${trackingHTML}
                            <div class="flex flex-col gap-3 mt-6">
                                ${trackButton}
                                <button onclick="showPaymentInfo('${order.orderNumber}')"
                                        class="w-full bg-zinc-800 hover:bg-zinc-700 text-cyan-300 py-3 rounded-2xl text-sm font-medium transition-all">
                                    Überweisungsdaten anzeigen
                                </button>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                });
        }

        function showOrderHistory() {
            if (!currentUser) {
                alert("Bitte zuerst einloggen!");
                showAuthModal();
                return;
            }
            const modal = document.getElementById("history-modal");
            modal.classList.remove("hidden");
            modal.classList.add("flex");
            loadUserOrders();
        }

        function closeHistoryModal() {
            const modal = document.getElementById("history-modal");
            modal.classList.add("hidden");
            modal.classList.remove("flex");
            if (ordersUnsubscribe) {
                ordersUnsubscribe();
                ordersUnsubscribe = null;
            }
        }

        function showPaymentInfo(orderNumber) {
            const infoHTML = `
                <div class="space-y-4 text-sm">
                    <div><strong>Bank:</strong> ${BANK_NAME}</div>
                    <div><strong>Empfänger:</strong> ${BANK_OWNER}</div>
                    <div><strong>IBAN:</strong> <span class="font-mono break-all">${BANK_IBAN}</span></div>
                    ${BANK_BIC ? `<div><strong>BIC:</strong> ${BANK_BIC}</div>` : ''}
                    <div><strong>Betrag:</strong> <span class="font-bold text-xl">${document.getElementById("cart-total-price").textContent}</span></div>
                    <div class="pt-4 border-t border-white/20">
                        <div class="text-amber-300 text-xs tracking-wider">VERWENDUNGSZWECK</div>
                        <div class="font-mono bg-zinc-900 p-3 rounded-xl text-center text-base mt-1">${orderNumber}</div>
                    </div>
                </div>
                <p class="text-emerald-400 text-xs mt-6">Sobald das Geld da ist, packe ich deine Bestellung und versende per DHL. <strong>Der Versand dauert in der Regel 1–3 Werktage.</strong></p>
            `;
            document.getElementById("payment-info-content").innerHTML = infoHTML;
            const modal = document.getElementById("payment-info-modal");
            modal.classList.remove("hidden"); modal.classList.add("flex");
        }

        function closePaymentInfoModal() {
            const modal = document.getElementById("payment-info-modal");
            modal.classList.add("hidden"); modal.classList.remove("flex");
        }

        function showToast(msg, type = "success") {
            const toast = document.getElementById('notification-toast');
            if (type === "error") {
                toast.style.background = "rgba(185, 28, 28, 0.85)";
            } else {
                toast.style.background = "rgba(0,0,0,0.85)";
            }
            toast.innerHTML = msg;
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 6000);
        }

        function generateNotificationList() {
            notificationList = [];
            const available = allProducts;
            for (let i = 0; i < 10; i++) {
                const name = fakeNames[Math.floor(Math.random() * fakeNames.length)];
                const prod = available[Math.floor(Math.random() * available.length)].name;
                const min = Math.floor(Math.random() * 59) + 1;
                const text = min === 1 ? "Minute" : "Minuten";
                notificationList.push(`${name} bestellte vor ${min} ${text} ${prod}.`);
            }
            localStorage.setItem('wavevapes_notifications', JSON.stringify(notificationList));
            localStorage.setItem('wavevapes_last_generate', Date.now());
        }

        function checkAndGenerateNotifications() {
            const last = localStorage.getItem('wavevapes_last_generate');
            if (!last || (Date.now() - last > HOUR_MS)) generateNotificationList();
            else {
                const stored = localStorage.getItem('wavevapes_notifications');
                if (stored) notificationList = JSON.parse(stored);
                else generateNotificationList();
            }
        }

        function showNextNotification() {
            if (notificationCyclePaused) return;
            const toast = document.getElementById('notification-toast');
            toast.textContent = notificationList[currentNotificationIndex];
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), NOTIFICATION_DURATION - 700);
            currentNotificationIndex = (currentNotificationIndex + 1) % notificationList.length;
        }

        function startNotificationCycle() {
            checkAndGenerateNotifications();
            showNextNotification();
            setInterval(showNextNotification, NOTIFICATION_DURATION);
            setInterval(checkAndGenerateNotifications, 60000);
        }

        function renderCategoryTabs() {
            const html = `
                <button onclick="setCategoryFilter('Alle')" class="px-5 py-2 transition ${currentCategoryFilter === 'Alle' ? 'tab-active' : ''}">Alle</button>
                <button onclick="setCategoryFilter('WaveVapes Tornado 30000')" class="px-5 py-2 transition flex items-center gap-x-3 ${currentCategoryFilter === 'WaveVapes Tornado 30000' ? 'tab-active' : ''}">
                    Tornado 30000 <span class="bg-amber-400 text-black text-xs font-black px-4 py-1 rounded-2xl">4 FÜR 3</span> <i class="fa-solid fa-bolt animate-bolt text-2xl"></i>
                </button>
                <button onclick="setCategoryFilter('Normale Sorten')" class="px-5 py-2 transition ${currentCategoryFilter === 'Normale Sorten' ? 'tab-active' : ''}">Normale Sorten</button>
                <button onclick="setCategoryFilter('Neue Sorten')" class="px-5 py-2 transition ${currentCategoryFilter === 'Neue Sorten' ? 'tab-active' : ''}">Neue Sorten</button>
            `;
            document.getElementById("category-tabs").innerHTML = html;
        }

        function setCategoryFilter(cat) {
            currentCategoryFilter = cat;
            renderCategoryTabs();
            renderProducts();
        }

        function showImpressumModal() {
            const modal = document.getElementById("impressum-modal");
            modal.classList.remove("hidden"); modal.classList.add("flex");
        }

        function closeImpressumModal() {
            const modal = document.getElementById("impressum-modal");
            modal.classList.add("hidden"); modal.classList.remove("flex");
        }

        function showDatenschutzModal() {
            const modal = document.getElementById("datenschutz-modal");
            modal.classList.remove("hidden"); modal.classList.add("flex");
        }

        function closeDatenschutzModal() {
            const modal = document.getElementById("datenschutz-modal");
            modal.classList.add("hidden"); modal.classList.remove("flex");
        }

        function showAgeModal() {
            const modal = document.getElementById("age-modal");
            modal.classList.remove("hidden"); modal.classList.add("flex");
        }

        function confirmAge() {
            localStorage.setItem("age_verified", "true");
            const modal = document.getElementById("age-modal");
            modal.classList.add("hidden"); modal.classList.remove("flex");
            showToast("✅ Willkommen bei WaveVapes!");
        }

        function denyAge() {
            const modal = document.getElementById("age-modal");
            modal.classList.add("hidden"); modal.classList.remove("flex");
            alert("Dieser Shop ist nur für Personen ab 18 Jahren.");
        }

        function filterProducts() {
            renderProducts();
        }

        function showProductDetail(id) {
            const product = allProducts.find(p => p.id === id);
            if (!product) return;
            const nicotineHTML = product.category !== "WaveVapes Tornado 30000" ? `
                <div class="mt-6">
                    <p class="text-xs text-gray-400 mb-2">Nikotinstärke</p>
                    <select id="modal-nicotine" class="nicotine-select w-full">
                        <option value="10 mg">10 mg</option>
                        <option value="20 mg" selected>20 mg</option>
                    </select>
                </div>` : '';
            const html = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                    <div>
                        ${product.image ? `<img src="${product.image}" class="w-full rounded-3xl shadow-2xl" alt="${product.name} – WaveVapes Premium Vape oder Liquid" loading="eager" decoding="async" width="600" height="400">` : ''}
                    </div>
                    <div>
                        <h2 class="text-4xl font-bold tracking-tighter neon-text">${product.name}</h2>
                        <div class="flex items-center gap-3 mt-3 text-emerald-400">
                            <span class="text-3xl">★ ★ ★ ★ ★</span>
                            <span class="text-sm">(4.98 • 347 Bewertungen)</span>
                        </div>
                        <div class="mt-8 text-gray-300 leading-relaxed text-[15px]">
                            ${product.description ? product.description.replace(/\n/g, '<br>') : '<p class="text-gray-400 italic">Noch keine Beschreibung hinterlegt.<br>Trage sie im Admin-Panel ein!</p>'}
                        </div>
                        <div class="price-row mt-8">
                            <span class="discount-price text-2xl">35,99 €</span>
                            <span class="sale-price text-5xl font-bold">${product.price.toFixed(2).replace('.', ',')} €</span>
                        </div>
                        ${nicotineHTML}
                        <div class="flex items-center gap-4 mt-10">
                            <button onclick="addFromDetail('${product.id}')"
                                    class="flex-1 bg-gradient-to-r from-cyan-400 to-purple-500 text-black font-bold py-6 rounded-3xl text-xl hover:scale-105 transition">
                                In den Warenkorb
                            </button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('detail-content').innerHTML = html;
            const modal = document.getElementById("product-detail-modal");
            modal.classList.remove("hidden");
            modal.classList.add("flex");
        }

        function closeProductDetail() {
            const modal = document.getElementById("product-detail-modal");
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        }

        function addFromDetail(id) {
            const product = allProducts.find(p => p.id === id);
            if (!product || !product.available) return;
            let existing = cart.find(item => item.id === id);
            if (!existing) {
                existing = { id, name: product.name, qty: 0, price: product.price, nicotine: "20 mg" };
                cart.push(existing);
            }
            const select = document.getElementById("modal-nicotine");
            if (select) existing.nicotine = select.value;
            existing.qty = (existing.qty || 0) + 1;
            manageMysteryVape();
            updateCartDisplay();
            renderProducts();
            closeProductDetail();
            showToast(`✅ ${product.name} wurde hinzugefügt!`);
        }

        function initialize() {
            initEmailJS();
            if (!localStorage.getItem("age_verified")) showAgeModal();
            localStorage.removeItem('wavevapes_notifications');
            localStorage.removeItem('wavevapes_last_generate');
            updateAuthUI();
            updateUserDisplay();
            updateLoyaltyDisplay();
            renderCategoryTabs();
            loadProducts();
            updateCartDisplay();
            startNotificationCycle();
            checkAndAutoRedeemLoyalty();
            checkAbandonedCart();
            saveAbandonedCartToLocal();
        }

        window.onload = initialize;
    </script>
</body>
</html>
