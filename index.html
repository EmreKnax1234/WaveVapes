<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WaveVapes – Disposable Vapes & Liquids</title>
  <meta name="description" content="WaveVapes Shop – Disposable Vapes bis 30000 Puffs und Premium Liquids online.">
  <meta name="google-site-verification" content="3kBk4qEfWOIpWL7969larnRHDzPJ60AVgzE67bUkS18" />

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a0a0a, #1e1233, #0a0a0a);
      color: white;
      min-height: 100vh;
    }
    .neon-text { text-shadow: 0 0 15px #67e8f9, 0 0 30px #67e8f9; }
    .product-card {
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 1rem;
      overflow: hidden;
    }
    .product-card:hover { transform: translateY(-12px) scale(1.04); box-shadow: 0 25px 50px -12px rgba(103, 232, 249, 0.5); }
    .tab-active { border-bottom: 4px solid #67e8f9; color: #67e8f9; font-weight: 600; }
    .qty-btn { transition: all 0.2s ease; }
    .qty-btn:hover { background: #22d3ee; color: black; }
    #notification-toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(16, 185, 129, 0.9); color: white;
      padding: 12px 24px; border-radius: 9999px; font-size: 14px; opacity: 0;
      transition: all 0.5s ease; z-index: 9999; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    #notification-toast.visible { opacity: 1; transform: translateX(-50%) translateY(-12px); }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 9999; }
    .modal-content { background: #18181b; border-radius: 1rem; padding: 2rem; max-width: 90%; width: 480px; max-height: 90vh; overflow-y: auto; }
    .input { background: #1f2937; border: 1px solid #374151; color: white; border-radius: 0.5rem; padding: 0.75rem 1rem; }
    .input:focus { outline: none; border-color: #67e8f9; box-shadow: 0 0 0 3px rgba(103,232,249,0.2); }
    .btn { transition: all 0.2s; }
    .btn:hover { transform: translateY(-1px); }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="bg-black/90 border-b border-cyan-900/30 sticky top-0 z-50 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <h1 class="text-3xl font-bold neon-text">WAVEVAPES</h1>
      </div>
      <div class="flex items-center gap-4">
        <button onclick="showAuthModal()" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-zinc-800 hover:bg-zinc-700">
          <i class="fa-solid fa-user"></i>
          <span id="current-user-display">Account</span>
        </button>
        <button onclick="toggleCart()" class="relative bg-gradient-to-r from-cyan-500 to-purple-600 text-white px-6 py-2 rounded-lg font-medium">
          <i class="fa-solid fa-cart-shopping mr-2"></i>Warenkorb
          <span id="cart-count-badge" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold rounded-full w-6 h-6 flex items-center justify-center">0</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-10">

    <!-- CATEGORY TABS -->
    <div id="category-tabs" class="flex flex-wrap gap-3 mb-8"></div>

    <!-- PRODUCTS GRID -->
    <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>

  </main>

  <!-- FLOATING CART BUTTON (mobile) -->
  <button onclick="toggleCart()" class="fixed bottom-6 right-6 bg-gradient-to-r from-cyan-500 to-purple-600 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center z-50 lg:hidden">
    <i class="fa-solid fa-cart-shopping text-xl"></i>
  </button>

  <!-- CART SIDEBAR -->
  <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full md:w-96 bg-zinc-950 border-l border-cyan-800 translate-x-full transition-transform duration-300 z-50 overflow-y-auto">
    <div class="p-6">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Warenkorb</h2>
        <button onclick="toggleCart()" class="text-3xl">&times;</button>
      </div>
      <div id="cart-items" class="space-y-4 mb-8"></div>
      <div class="border-t border-zinc-800 pt-6">
        <div class="flex justify-between text-lg mb-2">
          <span>Gesamt</span>
          <span id="cart-total">0,00 €</span>
        </div>
        <button onclick="placeOrder()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-lg font-bold mt-4">
          Bestellen
        </button>
      </div>
    </div>
  </div>

  <!-- AUTH MODAL -->
  <div id="auth-modal" class="modal">
    <div class="modal-content">
      <div class="flex justify-between items-center mb-6">
        <h2 id="auth-title" class="text-2xl font-bold">Anmelden</h2>
        <button onclick="closeModal('auth-modal')" class="text-3xl">&times;</button>
      </div>
      <div id="auth-forms">
        <div id="login-form">
          <input id="login-email" type="email" placeholder="E-Mail" class="input w-full mb-4" required>
          <input id="login-password" type="password" placeholder="Passwort" class="input w-full mb-4" required>
          <button onclick="login()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white py-3 rounded-lg font-bold">Einloggen</button>
          <p class="text-center mt-4">
            Noch kein Konto? <button onclick="switchToRegister()" class="text-cyan-400">Registrieren</button>
          </p>
        </div>
        <div id="register-form" class="hidden">
          <input id="register-email" type="email" placeholder="E-Mail" class="input w-full mb-4" required>
          <input id="register-password" type="password" placeholder="Passwort" class="input w-full mb-4" required>
          <button onclick="register()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-lg font-bold">Konto erstellen</button>
          <p class="text-center mt-4">
            Bereits registriert? <button onclick="switchToLogin()" class="text-cyan-400">Einloggen</button>
          </p>
        </div>
      </div>
      <div id="logged-in-view" class="hidden text-center">
        <p class="text-xl mb-6">Eingeloggt als <span id="logged-email" class="font-bold"></span></p>
        <button onclick="logout()" class="bg-red-600 hover:bg-red-500 text-white px-8 py-3 rounded-lg">Ausloggen</button>
      </div>
    </div>
  </div>

  <!-- SUCCESS MODAL -->
  <div id="success-modal" class="modal">
    <div class="modal-content text-center">
      <h2 class="text-3xl font-bold text-emerald-400 mb-6">Bestellung erfolgreich!</h2>
      <p id="success-message" class="mb-8"></p>
      <button onclick="closeModal('success-modal')" class="bg-cyan-600 hover:bg-cyan-500 text-white px-10 py-4 rounded-lg font-bold">Schließen</button>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-6 py-3 rounded-lg shadow-2xl z-50 opacity-0 transition-opacity"></div>

  <script>
    // ────────────────────────────────────────────────
    //  FIREBASE CONFIG
    // ────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyDsIUl-iYmH42MPbusFLhGhj5oGLh01BzI",
      authDomain: "wavevapes-7a960.firebaseapp.com",
      projectId: "wavevapes-7a960",
      storageBucket: "wavevapes-7a960.firebasestorage.app",
      messagingSenderId: "1093624390275",
      appId: "1:1093624390275:web:b1b8ae17bcf1b59dffb1b6",
      measurementId: "G-B8T2B657LL"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ────────────────────────────────────────────────
    //  STATE
    // ────────────────────────────────────────────────
    let allProducts = [];
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let currentUser = null;
    let loyaltyPoints = parseInt(localStorage.getItem('loyaltyPoints')) || 0;

    const MYSTERY_THRESHOLD = 100;
    const FREE_SHIPPING_THRESHOLD = 100;
    const SHIPPING_COST = 4.99;

    // ────────────────────────────────────────────────
    //  AUTH
    // ────────────────────────────────────────────────
    auth.onAuthStateChanged(user => {
      currentUser = user;
      document.getElementById('current-user-display').textContent = user ? user.email.split('@')[0] : 'Account';
      if (user) document.getElementById('logged-email').textContent = user.email;
    });

    function showAuthModal() { document.getElementById('auth-modal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function switchToRegister() {
      document.getElementById('login-form').classList.add('hidden');
      document.getElementById('register-form').classList.remove('hidden');
      document.getElementById('auth-title').textContent = 'Registrieren';
    }

    function switchToLogin() {
      document.getElementById('register-form').classList.add('hidden');
      document.getElementById('login-form').classList.remove('hidden');
      document.getElementById('auth-title').textContent = 'Anmelden';
    }

    async function register() {
      const email = document.getElementById('register-email').value.trim();
      const password = document.getElementById('register-password').value.trim();
      if (!email || !password) return alert('Bitte E-Mail und Passwort eingeben');
      try {
        await auth.createUserWithEmailAndPassword(email, password);
        closeModal('auth-modal');
        showToast('Registrierung erfolgreich!');
      } catch (e) { alert(e.message); }
    }

    async function login() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value.trim();
      if (!email || !password) return alert('Bitte E-Mail und Passwort eingeben');
      try {
        await auth.signInWithEmailAndPassword(email, password);
        closeModal('auth-modal');
        showToast('Erfolgreich eingeloggt!');
      } catch (e) { alert(e.message); }
    }

    function logout() {
      auth.signOut();
      showToast('Ausgeloggt');
    }

    // ────────────────────────────────────────────────
    //  PRODUKTE LADEN
    // ────────────────────────────────────────────────
    async function loadProducts() {
      const grid = document.getElementById('products-grid');
      grid.innerHTML = '<p class="col-span-full text-center py-20 text-gray-400">Lade Produkte...</p>';

      try {
        const snap = await db.collection('products').where('active', '==', true).get();
        allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

        renderCategoryTabs();
        renderProducts();
      } catch (err) {
        grid.innerHTML = '<p class="col-span-full text-center py-20 text-red-400">Fehler beim Laden</p>';
      }
    }

    function renderCategoryTabs() {
      const tabs = document.getElementById('category-tabs');
      const cats = ['Alle', ...new Set(allProducts.map(p => p.category))];
      tabs.innerHTML = cats.map(cat => `
        <button onclick="setCategoryFilter('${cat}')" class="px-6 py-2 ${currentCategoryFilter === cat ? 'tab-active' : ''}">
          ${cat}
        </button>
      `).join('');
    }

    let currentCategoryFilter = 'Alle';

    function setCategoryFilter(cat) {
      currentCategoryFilter = cat;
      renderCategoryTabs();
      renderProducts();
    }

    function renderProducts() {
      const grid = document.getElementById('products-grid');
      grid.innerHTML = '';

      let filtered = allProducts;
      if (currentCategoryFilter !== 'Alle') {
        filtered = filtered.filter(p => p.category === currentCategoryFilter);
      }

      filtered.forEach(p => {
        const inCart = cart.find(i => i.id === p.id);
        const qty = inCart ? inCart.qty : 0;

        const card = document.createElement('div');
        card.className = 'product-card p-6';
        card.innerHTML = `
          <h3 class="text-xl font-bold mb-2">${p.name}</h3>
          <p class="text-2xl font-bold text-emerald-400 mb-4">${p.price.toFixed(2)} €</p>
          <div class="flex items-center justify-between mb-4">
            <button onclick="changeQuantity('${p.id}', -1)" class="qty-btn bg-zinc-800 w-10 h-10 rounded-full">-</button>
            <span class="text-xl font-bold">${qty}</span>
            <button onclick="changeQuantity('${p.id}', 1)" class="qty-btn bg-zinc-800 w-10 h-10 rounded-full">+</button>
          </div>
          <button onclick="addToCart('${p.id}')" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white py-3 rounded-lg font-medium">
            In den Warenkorb
          </button>
        `;
        grid.appendChild(card);
      });
    }

    function changeQuantity(id, delta) {
      let item = cart.find(i => i.id === id);
      if (!item) {
        const prod = allProducts.find(p => p.id === id);
        if (!prod) return;
        item = { id, name: prod.name, price: prod.price, qty: 0 };
        cart.push(item);
      }
      item.qty = Math.max(0, item.qty + delta);
      if (item.qty === 0) cart = cart.filter(i => i.id !== id);
      saveCart();
      updateCartDisplay();
      renderProducts();
    }

    function addToCart(id) {
      changeQuantity(id, 1);
      showToast('Zum Warenkorb hinzugefügt');
    }

    function saveCart() {
      localStorage.setItem('cart', JSON.stringify(cart));
    }

    function loadCart() {
      cart = JSON.parse(localStorage.getItem('cart')) || [];
      updateCartDisplay();
    }

    function updateCartDisplay() {
      const count = cart.reduce((sum, i) => sum + i.qty, 0);
      document.getElementById('cart-count-badge').textContent = count;

      const itemsDiv = document.getElementById('cart-items');
      itemsDiv.innerHTML = cart.map(item => `
        <div class="flex justify-between items-center bg-zinc-800 p-4 rounded-lg">
          <div>
            <div class="font-medium">${item.name}</div>
            <div class="text-sm text-gray-400">${item.qty} × ${item.price.toFixed(2)} €</div>
          </div>
          <button onclick="changeQuantity('${item.id}', -${item.qty})" class="text-red-400">
            <i class="fa-solid fa-trash"></i>
          </button>
        </div>
      `).join('');

      const total = cart.reduce((sum, i) => sum + i.qty * i.price, 0);
      document.getElementById('cart-total').textContent = total.toFixed(2) + ' €';
    }

    function toggleCart() {
      document.getElementById('cart-sidebar').classList.toggle('translate-x-full');
    }

    async function placeOrder() {
      if (!currentUser) return showToast('Bitte einloggen', 'error');
      if (cart.length === 0) return showToast('Warenkorb leer', 'error');

      const total = cart.reduce((sum, i) => sum + i.qty * i.price, 0);

      try {
        await db.collection('orders').add({
          userId: currentUser.uid,
          userEmail: currentUser.email,
          items: cart,
          total,
          status: 'Warten auf Zahlung',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        // Loyalty-Punkte
        loyaltyPoints += Math.floor(total);
        localStorage.setItem('loyaltyPoints', loyaltyPoints);

        cart = [];
        saveCart();
        updateCartDisplay();
        toggleCart();
        document.getElementById('success-message').textContent = `Bestellung eingegangen! (${total.toFixed(2)} €)`;
        document.getElementById('success-modal').style.display = 'flex';
        showToast('Bestellung erfolgreich!');
      } catch (err) {
        console.error(err);
        showToast('Fehler beim Bestellen', 'error');
      }
    }

    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.background = type === 'error' ? '#dc2626' : '#10b981';
      toast.classList.add('visible');
      setTimeout(() => toast.classList.remove('visible'), 3000);
    }

    // Initialisierung
    loadCart();
    loadProducts();
  </script>
</body>
</html>
