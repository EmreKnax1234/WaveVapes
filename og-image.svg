<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0a0a"/>
      <stop offset="45%"  stop-color="#1e1233"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <!-- Cyan Glow -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <!-- Purple Accent -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <!-- Red Badge Gradient -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <!-- Green Gradient -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Text Shadow Filter -->
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Ambient glow orbs -->
  <ellipse cx="200" cy="120" rx="300" ry="200" fill="rgba(103,232,249,0.04)"/>
  <ellipse cx="1050" cy="500" rx="280" ry="200" fill="rgba(167,139,250,0.05)"/>
  <ellipse cx="600" cy="315" rx="400" ry="200" fill="rgba(34,211,238,0.025)"/>

  <!-- ── TOP ACCENT LINE ── -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#cyanGrad)"/>

  <!-- ── LOGO AREA (left) ── -->
  <!-- Logo circle -->
  <circle cx="130" cy="100" r="52" fill="rgba(34,211,238,0.08)" stroke="rgba(34,211,238,0.3)" stroke-width="1.5"/>
  <!-- W letter as logo placeholder — visually matches WaveVapes brand -->
  <text x="130" y="116" font-family="Arial Black, sans-serif" font-size="44" font-weight="900"
        fill="url(#cyanGrad)" text-anchor="middle" filter="url(#glowCyan)">W</text>

  <!-- Brand name -->
  <text x="200" y="88" font-family="Arial Black, sans-serif" font-size="32" font-weight="900"
        fill="#ffffff" letter-spacing="2">Wave</text>
  <text x="200" y="124" font-family="Arial Black, sans-serif" font-size="32" font-weight="900"
        fill="url(#cyanGrad)" letter-spacing="2" filter="url(#glowCyan)">Vapes</text>

  <!-- Tagline -->
  <text x="200" y="148" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)"
        letter-spacing="3">PREMIUM VAPE SHOP · DEUTSCHLAND</text>

  <!-- ── DIVIDER ── -->
  <rect x="60" y="175" width="1080" height="1" fill="rgba(255,255,255,0.08)"/>

  <!-- ── MAIN HEADLINE ── -->
  <text x="600" y="265" font-family="Arial Black, sans-serif" font-size="62" font-weight="900"
        fill="#ffffff" text-anchor="middle" letter-spacing="-1">Disposable Vapes &amp;</text>
  <text x="600" y="340" font-family="Arial Black, sans-serif" font-size="62" font-weight="900"
        fill="url(#cyanGrad)" text-anchor="middle" letter-spacing="-1" filter="url(#textGlow)">ELFLIQ Liquids kaufen</text>

  <!-- ── FEATURE BADGES ── -->

  <!-- Badge 1: 4 für 3 -->
  <rect x="60" y="390" width="240" height="80" rx="20" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.4)" stroke-width="1.5"/>
  <text x="180" y="425" font-family="Arial Black, sans-serif" font-size="22" font-weight="900"
        fill="#ef4444" text-anchor="middle">4 FÜR 3</text>
  <text x="180" y="452" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.55)"
        text-anchor="middle">Aktion aktiv – automatisch</text>

  <!-- Badge 2: Tornado 30000 -->
  <rect x="330" y="390" width="240" height="80" rx="20" fill="rgba(103,232,249,0.08)" stroke="rgba(103,232,249,0.35)" stroke-width="1.5"/>
  <text x="450" y="425" font-family="Arial Black, sans-serif" font-size="18" font-weight="900"
        fill="#67e8f9" text-anchor="middle" filter="url(#glowCyan)">TORNADO 30000</text>
  <text x="450" y="452" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.55)"
        text-anchor="middle">bis zu 30.000 Züge · 20+ Sorten</text>

  <!-- Badge 3: ELFLIQ ab 7,99 -->
  <rect x="600" y="390" width="240" height="80" rx="20" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.35)" stroke-width="1.5"/>
  <text x="720" y="425" font-family="Arial Black, sans-serif" font-size="22" font-weight="900"
        fill="#a78bfa" text-anchor="middle">ab 7,99 €</text>
  <text x="720" y="452" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.55)"
        text-anchor="middle">ELFLIQ NicSalt · 25+ Sorten</text>

  <!-- Badge 4: Gratis Versand -->
  <rect x="870" y="390" width="270" height="80" rx="20" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.35)" stroke-width="1.5"/>
  <text x="1005" y="418" font-family="Arial Black, sans-serif" font-size="16" font-weight="900"
        fill="#34d399" text-anchor="middle">🚚 Gratis DHL-Versand</text>
  <text x="1005" y="441" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.55)"
        text-anchor="middle">ab 100 € · inkl. Mystery Vape</text>
  <text x="1005" y="462" font-family="Arial, sans-serif" font-size="12" fill="rgba(52,211,153,0.7)"
        text-anchor="middle">schnell &amp; diskret per DHL</text>

  <!-- ── BOTTOM BAR ── -->
  <rect x="0" y="545" width="1200" height="85" fill="rgba(0,0,0,0.4)"/>
  <rect x="0" y="545" width="1200" height="1" fill="rgba(255,255,255,0.06)"/>

  <!-- URL / Domain -->
  <text x="600" y="590" font-family="Arial Black, sans-serif" font-size="24" font-weight="700"
        fill="url(#cyanGrad)" text-anchor="middle" letter-spacing="2" filter="url(#glowCyan)">wavevapes.de</text>
  <text x="600" y="614" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.3)"
        text-anchor="middle" letter-spacing="1">LOYALTY PUNKTE · MYSTERY VAPE · NUR 18+</text>

  <!-- ── BOTTOM ACCENT LINE ── -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#purpleGrad)"/>

  <!-- Stars decoration -->
  <text x="80" y="598" font-size="14" fill="#fbbf24">★★★★★</text>
  <text x="180" y="598" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.35)">4.9/5 · über 100 Bewertungen</text>

  <!-- 18+ badge top right -->
  <rect x="1090" y="70" width="70" height="35" rx="8" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.4)" stroke-width="1.5"/>
  <text x="1125" y="92" font-family="Arial Black, sans-serif" font-size="16" font-weight="900"
        fill="#ef4444" text-anchor="middle">18+</text>
</svg>
