name            = "wavevapes-email"
main            = "index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ── Email binding ─────────────────────────────────────────────
# Requires Cloudflare Email Routing to be active on wavevapes.de
[[send_email]]
name = "SEND_EMAIL"

# ── Public vars (non-secret) ──────────────────────────────────
[vars]
FROM_EMAIL   = "noreply@wavevapes.de"
FROM_NAME    = "WaveVapes"
ADMIN_EMAIL  = "admin@wavevapes.de"
SHOP_URL     = "https://wavevapes.de"

# ── Secrets — set once via CLI, never commit ──────────────────
# wrangler secret put API_SECRET_KEY
# → generate a random 32-char string, save it in .env and in
#   Firebase Functions config / Cloud Secrets Manager too
